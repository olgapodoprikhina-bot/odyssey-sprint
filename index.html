<script type="module" id="firebase-init">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, onSnapshot }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAuC3AqNmYOR1hSD0WkN5V22vC7RIHzI6A",
    authDomain: "odyssey-sprint.firebaseapp.com",
    projectId: "odyssey-sprint",
    storageBucket: "odyssey-sprint.firebasestorage.app",
    messagingSenderId: "952634288843",
    appId: "1:952634288843:web:caf628e79a73f31c92c94e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const USER_DOC = 'users/olga';

  window.fbSave = async function(data) {
    try {
      await setDoc(doc(db, USER_DOC), data, { merge: true });
    } catch(e) { console.warn('fbSave error:', e); }
  };

  window.fbLoad = async function() {
    try {
      const snap = await getDoc(doc(db, USER_DOC));
      return snap.exists() ? snap.data() : null;
    } catch(e) { console.warn('fbLoad error:', e); return null; }
  };

  window.fbSubscribe = function(onChange) {
    return onSnapshot(doc(db, USER_DOC), snap => {
      if(snap.exists()) onChange(snap.data());
    }, e => console.warn('fbSubscribe error:', e));
  };

  console.log('Firebase initialized: odyssey-sprint');
</script>

  const n=parseInt(bb);

// ── утиліта форматування дати ──
const fmtDate=ts=>{
  const d=new Date(ts);
  return d.getDate()+"."+(d.getMonth()+1)+"."+d.getFullYear();
};
const fmtShort=ts=>{const d=new Date(ts);return d.getDate()+"."+(d.getMonth()+1)+".";};
const addDays=(dateStr,n)=>{const d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const weekRange=(sprintStart,weekNum)=>{if(!sprintStart)return "";return fmtShort(addDays(sprintStart,(weekNum-1)*7))+"–"+fmtShort(addDays(sprintStart,weekNum*7-1));};
const sprintRange=(sprintStart)=>{if(!sprintStart)return "";return fmtShort(sprintStart)+"–"+fmtShort(addDays(sprintStart,20));};

    const collectIds=(parentId,projects)=>{
      const children=projects.filter(p=>p.parent_id===parentId);
      return [parentId,...children.flatMap(c=>collectIds(c.id,projects))];
    };
    const ids=allProjects.length>0?collectIds(rootProjectId,allProjects):[rootProjectId];
    
    let allTasks=[];
    for(const pid of ids){
      try{
        const res=await tdFetch("/tasks?project_id="+pid,token,"GET");
        if(res.ok){const tasks=await res.json();allTasks=[...allTasks,...tasks];}

      const wi=g.currentWeek-1;

      // Читаємо поточний стейт ПЕРЕД upd — щоб мати актуальний список
      const currentQuests=g.projects[projId].weeks[wi].quests;
      const existingTdIds=new Set(currentQuests.map(q=>q.todoistId).filter(Boolean));
      const existingNames=new Set(currentQuests.map(q=>q.name.trim().toLowerCase()));

      const newQuests=tasks
        .filter(t=>!t.parent_id && !t.checked)
        .filter(t=>!t.content.trimStart().startsWith("*"))
        .filter(t=>!existingTdIds.has(t.id) && !existingNames.has(t.content.trim().toLowerCase()))
        .map(t=>({

          todoistSection:t.section_id?sectionsMap[t.section_id]||null:null,
          dueDate:t.due?.date||null,
        }));

      // Оновити todoistId для задач які вже є по імені але без id
      upd(prev=>{

        const updatedExisting=pw[wi].quests.map(q=>{

          return match?{...q,todoistId:match.id}:q;

        pr[projId]={...pr[projId],weeks:pw};
        return{...prev,projects:pr,todoist:{...prev.todoist,lastSync:Date.now()}};

          .filter(t=>!t.parent_id&&!t.checked)

        <button onClick={exportData} style={{background:"rgba(74,143,212,0.1)",border:"1px solid rgba(74,143,212,0.4)",borderRadius:10,padding:"12px",color:"#4a8fd4",fontSize:13,fontWeight:600}}>💾 Зберегти дані</button>
        <button onClick={()=>importRef.current.click()} style={{background:"rgba(184,122,219,0.1)",border:"1px solid rgba(184,122,219,0.4)",borderRadius:10,padding:"12px",color:"#b87adb",fontSize:13,fontWeight:600}}>📂 Відновити дані</button>
        <button onClick={()=>setShowTodoist(true)} style={{background:"rgba(232,68,74,0.1)",border:"1px solid rgba(232,68,74,0.4)",borderRadius:10,padding:"12px",color:"#e8444a",fontSize:13,fontWeight:600,gridColumn:"1/-1",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span>🔴</span><span>{g.todoist?.token?"Todoist · "+( g.todoist.lastSync?"синхронізовано "+fmtDate(g.todoist.lastSync):"не синхронізовано"):"Підключити Todoist"}</span>
        </button>
        <button onClick={()=>setShowNotion(true)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid #252a35",borderRadius:10,padding:"12px",color:g.notion?.token?"#f0ece4":"#555",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span>⬛</span><span>{g.notion?.token?"Notion · "+(g.notion.lastSync?"збережено "+fmtDate(g.notion.lastSync):"не збережено"):"Підключити Notion"}</span>
        </button>
        <button onClick={saveToNotion} disabled={notionSaving||!g.notion?.token} style={{background:g.notion?.token?"rgba(74,184,112,0.1)":"rgba(255,255,255,0.03)",border:"1px solid "+(g.notion?.token?"rgba(74,184,112,0.4)":"#1a1a1a"),borderRadius:10,padding:"12px",color:g.notion?.token?"#4ab870":"#333",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {notionSaving?"⏳ Зберігаю...":"📓 Зберегти день в Notion"}
        </button>
        <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
        <button onClick={()=>setShowReset(true)} style={{background:"transparent",border:"1px solid #2a1515",borderRadius:10,padding:"12px",color:"#555",fontSize:13,gridColumn:"1/-1"}}>⚠️ Повне скидання</button>
      </div>
    </div>}

    {/* ════════════ HISTORY ════════════ */}
    {screen==="history"&&<div style={S.scr} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={S.ttl}>📜 Історія</div>
        <div style={{fontSize:11,color:"#555",fontFamily:"monospace"}}>{archive.length} спринт{archive.length===1?"":"ів"}</div>
      </div>

      {/* Загальна статистика */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:"rgba(200,168,64,0.08)",border:"1px solid rgba(200,168,64,0.25)",borderRadius:10,padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:700,color:"#c8a840"}}>{archive.length}</div>
          <div style={{fontSize:10,color:"#666",marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Завершених спринтів</div>
        </div>
        <div style={{background:"rgba(74,143,212,0.08)",border:"1px solid rgba(74,143,212,0.25)",borderRadius:10,padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:700,color:"#4a8fd4"}}>{archive.reduce((s,a)=>s+(a.manaTotal||0),0).toLocaleString()}</div>
          <div style={{fontSize:10,color:"#666",marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Мани зароблено</div>
        </div>
      </div>

      {archive.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#333"}}>
        <div style={{fontSize:40,marginBottom:12}}>📭</div>
        <div style={{fontSize:14,marginBottom:8}}>Архів порожній</div>
        <div style={{fontSize:12,color:"#2a2a2a",lineHeight:1.6}}>Завершені спринти зберігатимуться тут.<br/>Мана і досягнення нікуди не зникнуть.</div>
      </div>}

      {/* Архівні записи — від найновішого */}
      {[...archive].reverse().map((a,ri)=>{
        const i=archive.length-1-ri;
        const isOpen=histOpen===i;
        // Підрахувати середній грейд
        const allGrades=["A","B","C"].flatMap(pid=>a.projects[pid]?.gradeKeys||[]).filter(Boolean);
        const gradeScore={elite:4,solid:3,survive:2,reset:1};
        const avgScore=allGrades.length?allGrades.reduce((s,k)=>s+(gradeScore[k]||0),0)/allGrades.length:0;
        const overallGrade=avgScore>=3.5?"elite":avgScore>=2.5?"solid":avgScore>=1.5?"survive":"reset";

        return <div key={i} style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,overflow:"hidden"}}>
          {/* Header */}
          <button onClick={()=>setHistOpen(isOpen?null:i)}
            style={{width:"100%",background:"transparent",border:"none",padding:"14px 16px",textAlign:"left",color:"#f0ece4",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontFamily:"monospace",fontSize:11,color:"#c8a840",fontWeight:700}}>Спринт #{a.sprintNum}</span>
                <span style={{fontSize:16}}>{gradeEmoji[overallGrade]}</span>
                <span style={{fontSize:11,color:gradeColors[overallGrade]}}>{gradeLabel[overallGrade]}</span>
              </div>
              <div style={{fontSize:11,color:"#555"}}>{a.sprintStartDate?sprintRange(a.sprintStartDate):fmtDate(a.dateFinished)} · {(a.manaTotal||0).toLocaleString()} мани</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <button onClick={e=>{e.stopPropagation();if(window.confirm("Видалити Спринт #"+a.sprintNum+" з архіву?"))upd(p=>({...p,archive:p.archive.filter((_,idx)=>idx!==i)}));}} 
                style={{fontSize:11,color:"#444",background:"transparent",border:"1px solid #2a1515",borderRadius:6,padding:"3px 8px",cursor:"pointer",lineHeight:1}}>
                🗑
              </button>
              <div style={{fontSize:18,color:"#444"}}>{isOpen?"▲":"▼"}</div>
            </div>
          </button>

          {/* Розгорнутий контент */}
          {isOpen&&<div style={{padding:"0 16px 16px",borderTop:"1px solid #1a1a1a"}}>
            {/* Оцінки тижнів */}
            <div style={{marginTop:14,marginBottom:14}}>
              <div style={S.cl}>Оцінки тижнів</div>
              <WeekGrades gradeKeys={a.projects?.A?.gradeKeys||[null,null,null]}/>
            </div>

            {/* Проекти */}
            {PROJECTS.map(p=>{
              const ap=a.projects?.[p.id];if(!ap)return null;
              return <div key={p.id} style={{marginBottom:10,padding:"10px 12px",background:p.bg,border:"1px solid "+p.border,borderRadius:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:ap.goal?6:0}}>
                  <div style={{fontSize:11,color:p.color,fontWeight:700}}>{p.short} {p.emoji} {ap.name!==p.label?ap.name:""}</div>
                  <div style={{display:"flex",gap:3}}>
                    {(ap.gradeKeys||[]).map((gk,gi)=>gk?<span key={gi} style={{fontSize:13}}>{gradeEmoji[gk]}</span>:<span key={gi} style={{fontSize:11,color:"#333"}}>·</span>)}
                  </div>
                </div>
                {ap.goal&&<div style={{fontSize:12,color:"#888",lineHeight:1.4}}>{ap.goal}</div>}
              </div>;
            })}

            {/* Рефлексії тижнів */}
            {(a.weekReflections||[]).some(r=>r&&(r.overall||r.mood||r.done||r.improve))&&<div style={{marginTop:14}}>
              <div style={S.cl}>✍️ Рефлексія</div>
              {(a.weekReflections||[]).map((r,wi)=>{
                if(!r||(!(r.overall)&&!(r.mood)&&!(r.done)&&!(r.improve)))return null;
                return <div key={wi} style={{marginBottom:10,padding:"10px 12px",background:"rgba(184,122,219,0.06)",border:"1px solid rgba(184,122,219,0.2)",borderRadius:10}}>
                  <div style={{fontSize:10,fontFamily:"monospace",color:"#b87adb",marginBottom:8,letterSpacing:"0.1em",textTransform:"uppercase"}}>Тиждень {wi+1} · {gradeLabel[r.grade]||""}</div>
                  {r.overall&&<div style={{fontSize:11,color:"#888",marginBottom:5}}><span style={{color:"#555"}}>Загалом: </span>{r.overall}</div>}
                  {r.mood&&<div style={{fontSize:11,color:"#888",marginBottom:5}}><span style={{color:"#555"}}>Відчуття: </span>{r.mood}</div>}
                  {r.done&&<div style={{fontSize:11,color:"#888",marginBottom:5}}><span style={{color:"#555"}}>Вдалося: </span>{r.done}</div>}
                  {r.improve&&<div style={{fontSize:11,color:"#888"}}><span style={{color:"#555"}}>Покращити: </span>{r.improve}</div>}
                </div>;
              })}
            </div>}
          </div>}
        </div>;
      })}

      {/* Поточний спринт якщо розпочато */}
      {g.sprintStarted&&<div style={{background:"rgba(200,168,64,0.06)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:12,padding:"14px 16px"}}>
        <div style={S.cl}>Поточний · Спринт #{g.sprintNum||1} · Тиждень {cw}/3 <span style={{color:"#a08830",fontWeight:600,fontSize:11}}>· {weekRange(g.sprintStartDate,cw)}</span></div>
        {PROJECTS.map(p=>{const proj=g.projects[p.id];return<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:12,color:p.color,fontWeight:700}}>{p.short}</span>
          <span style={{fontSize:11,color:"#666",flex:1,marginLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{proj.goal||"—"}</span>
          <div style={{display:"flex",gap:3,marginLeft:8}}>
            {proj.gradeKeys.map((gk,gi)=>gk?<span key={gi} style={{fontSize:13}}>{gradeEmoji[gk]}</span>:<span key={gi} style={{fontSize:10,color:"#333"}}>·</span>)}
          </div>
        </div>;})}
      </div>}
    </div>}

    {/* ════════════ SPRINT ════════════ */}
    {screen==="sprint"&&<div style={S.scr} className="fu">
      {!g.sprintStarted
        ?<div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:17,fontWeight:700,marginBottom:20}}>Запланувати спринт #{g.sprintNum||1}</div>
          <button style={S.gold} onClick={startPlan}>🚀 Почати планування</button>
        </div>
        :<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={S.ttl}>🎯 Спринт #{g.sprintNum||1}{g.sprintStartDate&&<span style={{fontSize:12,color:"#a08830",fontWeight:600,marginLeft:8}}>{sprintRange(g.sprintStartDate)}</span>}</div>
            <div style={{fontSize:11,color:"#888",fontFamily:"monospace"}}>Тиждень {cw}/3{g.sprintStartDate&&<span style={{marginLeft:6,color:"#a08830",fontWeight:600}}>{weekRange(g.sprintStartDate,cw)}</span>}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {PROJECTS.map(p=><button key={p.id} onClick={()=>{setSprintTab(p.id);setExpandW(null);}}
              style={{flex:1,padding:"9px 4px",borderRadius:8,border:"2px solid "+(sprintTab===p.id?p.color:"transparent"),background:sprintTab===p.id?p.bg:"rgba(255,255,255,0.03)",color:sprintTab===p.id?p.color:"#555",fontSize:12,fontWeight:700}}>
              {p.short}<br/><span style={{fontSize:9,opacity:0.7}}>{p.emoji}</span>
            </button>)}
          </div>
          {PROJECTS.filter(p=>p.id===sprintTab).map(p=>{
            const proj=g.projects[p.id];
            return <div key={p.id}>
    
          {sprintTab==="A"&&<div style={{background:"#111",border:"1px solid #1e2028",borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#c8a840",textTransform:"uppercase"}}>🔁 Константи цього спринту</div>
              <button onClick={()=>setScreen("habits")} style={{fontSize:10,color:"#4a8fd4",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline"}}>трекер →</button>
            </div>
            {HABITS.map(h=>{
              const done=g.dailyHabits.includes(h.id);
              const streak=(g.habitStreak||{})[h.id]||0;
              const hdata=g.habits?.[h.id]||{content:"",note:""};
              return<div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #1a1a1a"}}>
                <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                  background:done?h.color:"transparent",border:"2px solid "+(done?h.color:"#2a2a2a"),fontSize:10}}>
                  {done&&<span style={{color:"#fff"}}>✓</span>}
                </div>
                <span style={{flexShrink:0}}>{h.emoji}</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:11,fontWeight:700,color:done?h.color:h.color}}>{h.name}</span>
                  {hdata.content&&<div style={{fontSize:11,color:"#666",marginTop:1}}>{hdata.content}</div>}
                  {!hdata.content&&<div style={{fontSize:11,color:"#333",fontStyle:"italic",marginTop:1}}>{h.desc}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {streak>=2&&<div style={{fontSize:10,color:"#e8a44a"}}>🔥{streak}</div>}
                  <span style={{fontSize:10,color:done?"#4ab870":"#555",fontFamily:"monospace"}}>{done?"✓":"+"+h.mana}</span>
                </div>
              </div>;
            })}
          </div>}
          {proj.goal&&<div style={{background:p.bg,border:"1px solid "+p.border,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:10,color:p.color,fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{p.emoji} {proj.name}</div>
                <div style={{fontSize:13,color:"#f0ece4",fontWeight:600,lineHeight:1.5,marginBottom:proj.why?8:0}}>{proj.goal}</div>
                {proj.why&&<div style={{fontSize:11,color:"#888",fontStyle:"italic",lineHeight:1.5,marginBottom:(proj.values||[]).length>0?8:0}}>💡 {proj.why}</div>}
                {(proj.values||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {(proj.values||[]).map(vid=>{const v=VALUES.find(x=>x.id===vid);return v?<span key={vid} style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"2px 8px",fontSize:10,color:p.color}}>{v.emoji} {v.label}</span>:null;})}</div>}
              </div>}
              {proj.weeks.map((w,wi)=>{
                const isCur=w.num===cw,isDone=!!proj.gradeKeys[wi],isLock=w.num>cw;
                const wDone=w.quests.filter(q=>q.done).length;
                const isExp=expandW===p.id+"_"+w.num||isCur;
                return <div key={wi} style={{background:"#161921",border:"1px solid "+(isCur?p.color:isDone?gradeColors[proj.gradeKeys[wi]]+"55":"#252a35"),borderRadius:12,padding:"14px 16px",opacity:isLock?0.5:1}}>
                  <button onClick={()=>setExpandW(isExp&&!isCur?null:p.id+"_"+w.num)}
                    style={{width:"100%",background:"transparent",border:"none",textAlign:"left",color:"#f0ece4",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:w.milestone?6:0}}>
                    <div>
                      <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:isCur?p.color:isDone?gradeColors[proj.gradeKeys[wi]]:"#555",marginBottom:3}}>
                        Тиждень {w.num}{g.sprintStartDate&&<span style={{marginLeft:4}}>· {weekRange(g.sprintStartDate,w.num)}</span>} {isCur?"· Зараз":isDone?"· "+gradeEmoji[proj.gradeKeys[wi]]:isLock?"· Заблоковано":""}
                      </div>
                      {w.milestone&&<div style={{fontSize:12,color:"#888",lineHeight:1.4}}>{w.milestone}</div>}
                    </div>
                    {w.quests.length>0&&<div style={{fontFamily:"monospace",fontSize:11,color:isCur?p.color:"#555",flexShrink:0,marginLeft:10}}>{wDone}/{w.quests.length}</div>}
                  </button>
                  {isExp&&<div style={{marginTop:8}}>
                    {/* Кнопка групування — тільки якщо є Notion проекти */}
                    {w.quests.some(q=>q.notionProjName)&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                      <span style={{fontSize:9,fontFamily:"monospace",color:"#444",textTransform:"uppercase",letterSpacing:"0.1em"}}>Групувати:</span>
                      {[{id:"none",label:"Список"},{id:"notion",label:"⬛ Notion"}].map(opt=><button key={opt.id} onClick={()=>setSprintWeekGroup(opt.id)}
                        style={{fontSize:9,padding:"3px 8px",borderRadius:6,border:"1px solid "+(sprintWeekGroup===opt.id?"#4a8fd4":"#252a35"),background:sprintWeekGroup===opt.id?"rgba(74,143,212,0.15)":"transparent",color:sprintWeekGroup===opt.id?"#4a8fd4":"#444",cursor:"pointer",fontFamily:"monospace"}}>
                        {opt.label}
                      </button>)}
                    </div>}
                    {(()=>{
                      if(sprintWeekGroup!=="notion"||!w.quests.some(q=>q.notionProjName)){
                        return w.quests.map(q=><QItem key={q.id} q={q}
                          onAdd={isCur&&!isLock&&!isDone?()=>addWQToday(q,p.id):null}
                          onDel={!isDone&&!isLock?()=>removeQ(p.id,w.num,q.id):null}
                          onNotion={g.notion?.token&&!q.notionPageId?(nProjId,nProjName)=>sendQuestToNotion(q,p.id,nProjId,nProjName):null}/>);
                      }
                      const groups={};
                      w.quests.forEach(q=>{const k=q.notionProjName||"⬜ Без проекту";if(!groups[k])groups[k]=[];groups[k].push(q);});
                      const groupEntries=questsGroupBy==="proj"
            ?PROJECTS.map(p=>[p.label,groups[p.label]]).filter(([,qs])=>qs)
            :Object.entries(groups);
          return groupEntries.map(([grp,qs])=><div key={grp} style={{marginBottom:8}}>
                        <div style={{fontSize:9,fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase",color:"#4a8fd4",marginBottom:5,paddingBottom:3,borderBottom:"1px solid #1a2030"}}>
                          ⬛ {grp} <span style={{color:"#333"}}>({qs.length})</span>
                        </div>
                        {qs.map(q=><QItem key={q.id} q={q}
                          onAdd={isCur&&!isLock&&!isDone?()=>addWQToday(q,p.id):null}
                          onDel={!isDone&&!isLock?()=>removeQ(p.id,w.num,q.id):null}
                          onNotion={g.notion?.token&&!q.notionPageId?(nProjId,nProjName)=>sendQuestToNotion(q,p.id,nProjId,nProjName):null}/>)}
                      </div>);
                    })()}
                    {!isLock&&<div style={{marginTop:8}}>
                      {p.id==="D"&&g.todoist?.projects?.inbox&&isCur&&<button onClick={()=>syncInbox()} disabled={tdSyncing}
                        style={{width:"100%",background:"rgba(74,184,160,0.08)",border:"1px solid rgba(74,184,160,0.3)",borderRadius:8,padding:"8px",color:"#4ab8a0",fontSize:12,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {tdSyncing?"⏳ Завантажую...":"📥 Оновити Inbox з Todoist"}
                      </button>}
                      {p.id!=="D"&&g.todoist?.token&&g.todoist?.projects?.[p.id]&&isCur&&<button onClick={()=>syncFromTodoist(p.id)} disabled={tdSyncing}
                        style={{width:"100%",background:"rgba(232,68,74,0.08)",border:"1px solid rgba(232,68,74,0.3)",borderRadius:8,padding:"8px",color:"#e8444a",fontSize:12,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {tdSyncing?"⏳ Завантажую...":"🔄 Завантажити з Todoist"}
                      </button>}
                      <div style={{display:"flex",gap:6,marginBottom:6}}>
                        <input style={{...S.inp,fontSize:12,padding:"8px 10px",flex:1}}
                          placeholder={"+ задача тижня "+w.num}
                          value={wqIn[p.id][wi]}
                          onChange={e=>{const n={...wqIn};n[p.id]=[...n[p.id]];n[p.id][wi]=e.target.value;setWqIn(n);}}
                          onKeyDown={e=>e.key==="Enter"&&addPlanQ(p.id,w.num)}/>
                        <button onClick={()=>addPlanQ(p.id,w.num)} style={{background:p.bg,border:"1px solid "+p.border,borderRadius:7,padding:"8px 12px",color:p.color,fontSize:14,fontWeight:700,flexShrink:0}}>+</button>
                      </div>
                      <ZonePick val={wqZn[p.id][wi]} onChange={v=>{const n={...wqZn};n[p.id]=[...n[p.id]];n[p.id][wi]=v;setWqZn(n);}}/>
                    </div>}
                  </div>}
                </div>;
              })}
            </div>;
          })}
        </>
      }
    </div>}

    {/* ════════════ PLANNING ════════════ */}
    {screen==="planning"&&<div style={S.scr} className="fu">
      <div style={{display:"flex",gap:3}}>
        {PROJECTS.map((p,pi)=>{const isDone=pi<planProjIdx;const isThis=p.id===planProjId;return<div key={p.id} style={{flex:1,height:4,borderRadius:2,background:isDone?p.color:isThis?p.color+"88":"#252a35",transition:"all 0.3s"}}/>;  })}
      </div>
      <div style={{fontSize:10,color:"#555",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>
        Проект {planProjIdx+1}/3 · {planProj.emoji} {planProj.short} · {planPhase==="goal"?"Ціль":planPhase==="milestones"?"Рубежі":"Квести тижнів"}
      </div>

      {planPhase==="goal"&&<>

          const hist={...pl.history};
          hist[today]={...hist[today],[blockId]:true};
          pl.history=hist;
          const allDone=pl.blocks.every(b=>wasDone[b.id]);

            const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
            pl.streak=(pl.lastDate===yesterday?(pl.streak||0)+1:1);

          pls[lang]=pl;
          return{...prev,mana:prev.mana+mana,langSession:pls};

        // Записати в Notion Log якщо французька і всі блоки виконані
        const allBlocks=(g.langSession?.[lang]?.blocks||[]);
        const curDone={...(g.langSession?.[lang]?.todayDone||{}),[blockId]:true};
        const isAllDone=allBlocks.every(b=>curDone[b.id]);
        if(isAllDone){
          const token=g.notion?.token||notionToken;
          if(token){
            const LOG_DB_ID="b38a1efa-e147-4448-a315-dadc1bf2d33e";
            const langNotionMap={
              "fr":{id:"171bf110-3591-8079-8417-df679bd16389",flag:"🇫🇷",name:"Французька"},
              "uk":{id:"31dbf11035918009919ed9bb066eb4d6",flag:"🇺🇦",name:"Українська"},
            };
            const langNotion=langNotionMap[lang];
            if(langNotion){
              notionFetch("/pages",token,"POST",{
                parent:{database_id:LOG_DB_ID},
                properties:{
                  "Name":{title:[{text:{content:langNotion.flag+" "+langNotion.name+" · "+today}}]},
                  "Date":{date:{start:today}},
                  "Habit":{relation:[{id:langNotion.id}]},
                  "VmqV":{checkbox:true},

          }
        }
      };

        upd(prev=>{
          const pls={...prev.langSession};

            <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",
              color:doneCnt===blocks.length&&blocks.length>0?"#4ab870":"#c8a840"}}>

            <button onClick={()=>setShopPurchasesOpen(v=>!v)} style={{width:"100%",background:"transparent",border:"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",marginBottom:shopPurchasesOpen?8:0,padding:0}}>
              <div style={{fontSize:9,color:"#444",fontFamily:"monospace"}}>ОСТАННІ ПОКУПКИ ({(g.purchases||[]).length})</div>
              <div style={{fontSize:11,color:"#555"}}>{shopPurchasesOpen?"▲":"▼"}</div>
            </button>
            {shopPurchasesOpen&&[...(g.purchases||[])].reverse().slice(0,3).map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,marginBottom:4}}>
              <span style={{color:"#888"}}>{p.emoji} {p.name}</span>
              <span style={{fontFamily:"monospace",color:"#e8444a",flexShrink:0,marginLeft:8}}>−{p.cost}</span>
            </div>)}
          </div>
        </div>;
      })()}

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowExchange(true)} style={{flex:1,background:"rgba(74,184,112,0.1)",border:"1px solid rgba(74,184,112,0.4)",borderRadius:10,padding:"11px 10px",color:"#4ab870",fontSize:13,fontWeight:700,textAlign:"center"}}>
          💸 Мана → гривні<br/><span style={{fontSize:10,opacity:0.7,fontWeight:400}}>1₴ = {MANA_RATE} мани</span>
        </button>
      </div>
      <div style={{background:"rgba(224,85,85,0.07)",border:"1px solid rgba(224,85,85,0.2)",borderRadius:8,padding:"9px 13px",fontSize:11,color:"#e05555"}}>⛔ Не в крамниці: мобільні ігри · безкінечний скрол · Notion без мети</div>
      {[{id:"micro",label:"🥉 Мікро",range:"1250-2000",color:"#4ab870"},{id:"comfort",label:"🥈 Комфорт",range:"3750-7500",color:"#4a8fd4"},{id:"epic",label:"🥇 Епік",range:"20000+",color:"#c8a840"}].map(tier=><div key={tier.id}>
        <div style={{fontSize:10,color:tier.color,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:8}}>{tier.label} · {tier.range} мани</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {SHOP.filter(i=>i.tier===tier.id).map(item=>{const can=g.mana>=item.cost,flash=shopFlash===item.id,cnt=(g.purchases||[]).filter(p=>p.id===item.id).length;return<button key={item.id} onClick={()=>buy(item)} style={{borderRadius:10,border:"1px solid "+(flash?tier.color:can?"#2a2820":"#181818"),padding:"13px 10px",background:flash?tier.color+"22":"rgba(255,255,255,0.03)",color:"#f0ece4",textAlign:"center",opacity:can?1:0.35,transform:flash?"scale(0.95)":"scale(1)",transition:"all 0.2s",display:"flex",flexDirection:"column",alignItems:"center",position:"relative"}}>
            {cnt>0&&<div style={{position:"absolute",top:6,right:8,fontSize:9,fontFamily:"monospace",color:tier.color,fontWeight:700,background:tier.color+"22",borderRadius:8,padding:"1px 5px"}}>×{cnt}</div>}
            <div style={{fontSize:24,marginBottom:5}}>{item.emoji}</div>
            <div style={{fontSize:11,fontWeight:600,marginBottom:6,lineHeight:1.3}}>{item.name}</div>
            <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:can?tier.color:"#444"}}>{item.cost}</div>
          </button>;})}
        </div>
      </div>)}
    </div>}

    {/* ════════════ REVIEW ════════════ */}
    {screen==="review"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>📊 Огляд тижня {cw}{g.sprintStartDate&&<span style={{fontSize:12,color:"#a08830",fontWeight:600,marginLeft:8}}>{weekRange(g.sprintStartDate,cw)}</span>}</div>
      <div style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={S.cl}>Квести тижня</div>
          <button onClick={()=>{
            const allQ=PROJECTS.flatMap(p=>g.projects[p.id].weeks[cw-1].quests.filter(q=>!q.isMilestone));
            setRevDone(allQ.filter(q=>q.done).length);
            setRevTotal(Math.max(1,allQ.length));
          }} style={{fontSize:10,color:"#4a8fd4",background:"rgba(74,143,212,0.1)",border:"1px solid rgba(74,143,212,0.3)",borderRadius:8,padding:"4px 9px",cursor:"pointer"}}>🔄 з квестів</button>
        </div>
        <div style={{fontSize:10,color:"#555",marginBottom:12,lineHeight:1.5}}>
          Підраховано автоматично з позначених квестів. Можеш скоригувати вручну — якщо щось зробила але не відмітила в додатку.
        </div>
        <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:16}}>
          {[{label:"Виконано",val:revDone,up:()=>setRevDone(v=>v+1),dn:()=>setRevDone(v=>Math.max(0,v-1)),c:"#4ab870"},{label:"Заплановано",val:revTotal,up:()=>setRevTotal(v=>v+1),dn:()=>setRevTotal(v=>Math.max(1,v-1)),c:"#f0ece4"}].map((fc,i)=><div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{fc.label}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <button onClick={fc.dn} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid #2a2820",color:"#f0ece4",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
              <div style={{fontSize:36,fontWeight:700,color:fc.c,minWidth:40,textAlign:"center"}}>{fc.val}</div>
              <button onClick={fc.up} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid #2a2820",color:"#f0ece4",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>)}
        </div>
        <div style={{background:gr.color+"18",border:"1px solid "+gr.color+"44",borderRadius:10,padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:40,fontWeight:700,color:gr.color}}>{pct}%</div>
          <div style={{fontSize:17,fontWeight:700,color:gr.color,marginBottom:4}}>{gr.label}</div>
          <div style={{fontSize:13,color:"#666"}}>{gr.bonus>0?"Бонус +"+gr.bonus+" мани":gr.bonus<0?"Штраф "+gr.bonus+" мани":"Без змін"}</div>
        </div>
      </div>
      <div style={S.card}>
        <div style={S.cl}>Прогрес по проектах</div>
        {PROJECTS.map(p=>{const proj=g.projects[p.id];const wq=proj.weeks[cw-1].quests;const done=wq.filter(q=>q.done).length;return<div key={p.id} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:p.color,fontWeight:700}}>{p.short} {p.emoji}</span><span style={{color:"#555",fontFamily:"monospace"}}>{done}/{wq.length}</span></div>
          {wq.length>0&&<div style={{height:3,background:"#1a1a1a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:(wq.length?done/wq.length*100:0)+"%",background:p.color,borderRadius:2,transition:"width 0.4s"}}/></div>}
        </div>;})}
      </div>
      {cw===3&&<div style={{background:"rgba(200,168,64,0.06)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"#c8a840",lineHeight:1.6}}>
        🏆 Це останній тиждень спринту.<br/>Після закриття спринт збережеться в Історії. Мана залишиться.
      </div>}
      <div style={S.card}>
        <div style={S.cl}>Шкала</div>
        {[{r:"85-100%",l:"🌟 Елітний",b:"+100",c:"#c8a840"},{r:"70-84%",l:"✅ Міцний",b:"+50",c:"#4ab870"},{r:"50-69%",l:"⚡ Виживання",b:"0",c:"#4a8fd4"},{r:"< 50%",l:"🔄 Скидання",b:"-30",c:"#e05555"}].map(x=><div key={x.r} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a1a",fontSize:12}}>
          <span style={{color:"#555"}}>{x.r}</span><span style={{color:x.c}}>{x.l}</span><span style={{fontFamily:"monospace",color:"#c8a840"}}>{x.b}</span>
        </div>)}
      </div>

      {/* ══ ПЕРЕНЕСЕННЯ КВЕСТІВ ══ */}
      {(()=>{
        const undoneProjQuests=PROJECTS.flatMap(p=>
          (g.projects[p.id]?.weeks[cw-1]?.quests||[])
            .filter(q=>!q.done&&!q.isMilestone)
            .map(q=>({...q,projId:p.id,projColor:p.color,projLabel:p.short}))
        );
        if(undoneProjQuests.length===0)return null;
        const allSelected=undoneProjQuests.every(q=>revCarryover.has(q.id));
        return <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:"#4ab8a0"}}>
              {cw<3?"📦 Перенести в тиждень "+(cw+1):"📦 Перенести в новий спринт"}
            </div>
            <button onClick={()=>{
              if(allSelected)setRevCarryover(new Set());
              else setRevCarryover(new Set(undoneProjQuests.map(q=>q.id)));
            }} style={{fontSize:10,color:"#4ab8a0",background:"rgba(74,184,160,0.1)",border:"1px solid rgba(74,184,160,0.3)",borderRadius:7,padding:"3px 9px",cursor:"pointer"}}>
              {allSelected?"Зняти всі":"Вибрати всі"}
            </button>
          </div>
          <div style={{fontSize:11,color:"#555",marginBottom:10,lineHeight:1.5}}>
            {cw<3?"Вибрані квести з'являться в наступному тижні зі збереженим Notion-лінком.":"Вибрані квести збережуться і з'являться при плануванні нового спринту."}
          </div>
          {undoneProjQuests.map(q=>{
            const sel=revCarryover.has(q.id);
            return <button key={q.id} onClick={()=>setRevCarryover(prev=>{const s=new Set(prev);sel?s.delete(q.id):s.add(q.id);return s;})}
              style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:sel?"rgba(74,184,160,0.08)":"transparent",border:"1px solid "+(sel?"rgba(74,184,160,0.4)":"#1e2028"),borderRadius:8,padding:"8px 10px",marginBottom:4,textAlign:"left",cursor:"pointer"}}>
              <div style={{width:18,height:18,borderRadius:4,flexShrink:0,background:sel?"#4ab8a0":"transparent",border:"2px solid "+(sel?"#4ab8a0":"#333"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>
                {sel&&<span style={{color:"#0d0f14",fontWeight:700}}>✓</span>}
              </div>
              <span style={{fontSize:10,fontWeight:700,color:q.projColor,flexShrink:0,fontFamily:"monospace"}}>{q.projLabel}</span>
              <span style={{fontSize:12,color:sel?"#f0ece4":"#888",flex:1,lineHeight:1.3}}>{q.name}</span>
              {q.notionPageId&&<span style={{fontSize:9,color:"#4ab8a0",flexShrink:0}}>N</span>}
              {q.todoistId&&<span style={{fontSize:9,color:"#e8444a",flexShrink:0}}>TD</span>}
            </button>;
          })}
          {revCarryover.size>0&&<div style={{marginTop:8,fontSize:11,color:"#4ab8a0",textAlign:"center"}}>
            ✓ {revCarryover.size} квест{revCarryover.size===1?"":"и"} буде перенесено
          </div>}
        </div>;
      })()}
      {/* ══ РЕФЛЕКСІЯ ══ */}
      <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"16px"}}>
        <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:"#b87adb",marginBottom:14}}>
          {cw<3?"✍️ Рефлексія тижня "+cw:"✍️ Рефлексія спринту"}
        </div>
        {[
          {key:"overall", q:cw<3?"Як пройшов тиждень в цілому?":"Як пройшов спринт в цілому?", placeholder:"Кілька слів про загальне відчуття..."},
          {key:"mood",    q:"Які відчуття залишились?",              placeholder:"Втома, задоволення, напруга, легкість..."},
          {key:"done",    q:"Що вдалося? Чим пишаєшся?",            placeholder:"Навіть маленьке — рахується..."},
          {key:"improve", q:"Що хотілось би покращити?",             placeholder:"Без самокритики — просто спостереження..."},
        ].map(({key,q,placeholder})=><div key={key} style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6,lineHeight:1.4}}>{q}</div>
          <textarea
            value={revNote[key]}
            onChange={e=>setRevNote(p=>({...p,[key]:e.target.value}))}
            placeholder={placeholder}
            rows={2}
            style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid #252a35",borderRadius:8,padding:"9px 11px",color:"#f0ece4",fontSize:12,resize:"vertical",lineHeight:1.5,fontFamily:"system-ui,sans-serif"}}
          />
        </div>)}
        <div style={{fontSize:10,color:"#444",fontStyle:"italic",marginTop:2}}>
          Поля необов'язкові — заповни скільки хочеш.
        </div>
      </div>

      <button style={{...S.gold,fontSize:15,padding:"15px"}} onClick={closeWeek}>
        {cw<3?"🏁 Закрити тиждень "+cw+" → Тиждень "+(cw+1):"🏆 Завершити спринт!"}
      </button>
    </div>}

    </div>

    <nav style={{position:"sticky",bottom:0,display:"flex",background:"#101218",borderTop:"1px solid #1e2028",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setScreen(t.id)}
        style={{flex:1,border:"none",background:"transparent",padding:"10px 1px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:screen===t.id?"2px solid #c8a840":"2px solid transparent",color:screen===t.id?"#c8a840":"#444"}}>
        <span style={{fontSize:17}}>{t.e}</span><span style={{fontSize:8}}>{t.l}</span>
      </button>)}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
