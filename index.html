const bbToCard=bb=>{
  const n=parseInt(bb);
  if(isNaN(n)||n<0||n>100)return null;
  if(n<=20)return{id:"dead",range:"0-20",  label:"Порожньо", emoji:"💀",mult:1,  color:"#e05555",bg:"#2a1515",modes:["save"]};
  if(n<=40)return{id:"low", range:"21-40", label:"Мало",     emoji:"🔻",mult:1.2,color:"#d4804a",bg:"#2a1c10",modes:["save","normal"]};
  if(n<=60)return{id:"mid", range:"41-60", label:"Норма",    emoji:"⚡",mult:1.5,color:"#c8a840",bg:"#252010",modes:["normal"]};
  if(n<=80)return{id:"good",range:"61-80", label:"Заряджено",emoji:"🔷",mult:2,  color:"#4a8fd4",bg:"#101e2a",modes:["normal","hyper"]};
  return        {id:"peak",range:"81-100",label:"Піковий",  emoji:"🌟",mult:3,  color:"#4ab870",bg:"#101e14",modes:["normal","hyper"]};
};

    const collectIds=(parentId,projects)=>{
      const children=projects.filter(p=>p.parent_id===parentId);
      return [parentId,...children.flatMap(c=>collectIds(c.id,projects))];
    };
    const ids=allProjects.length>0?collectIds(rootProjectId,allProjects):[rootProjectId];

    for(const pid of ids){

      const currentQuests=g.projects[projId].weeks[wi].quests;
      const existingTdIds=new Set(currentQuests.map(q=>q.todoistId).filter(Boolean));
      const existingNames=new Set(currentQuests.map(q=>q.name.trim().toLowerCase()));

      const newQuests=tasks
        .filter(t=>!t.parent_id && !t.checked)

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

        <button onClick={()=>setScreen("history")} style={{background:"transparent",border:"1px solid #252a35",borderRadius:10,padding:"12px",color:"#777",fontSize:13}}>📜 Історія</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <button onClick={exportData} style={{background:"rgba(74,143,212,0.1)",border:"1px solid rgba(74,143,212,0.4)",borderRadius:10,padding:"12px",color:"#4a8fd4",fontSize:13,fontWeight:600}}>💾 Зберегти дані</button>
        <button onClick={()=>importRef.current.click()} style={{background:"rgba(184,122,219,0.1)",border:"1px solid rgba(184,122,219,0.4)",borderRadius:10,padding:"12px",color:"#b87adb",fontSize:13,fontWeight:600}}>📂 Відновити дані</button>
        <button onClick={()=>setShowTodoist(true)} style={{background:"rgba(232,68,74,0.1)",border:"1px solid rgba(232,68,74,0.4)",borderRadius:10,padding:"12px",color:"#e8444a",fontSize:13,fontWeight:600,gridColumn:"1/-1",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span>🔴</span><span>{g.todoist?.token?"Todoist · "+( g.todoist.lastSync?"синхронізовано "+fmtDate(g.todoist.lastSync):"не синхронізовано"):"Підключити Todoist"}</span>
        </button>
        <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
        <button onClick={()=>setShowReset(true)} style={{background:"transparent",border:"1px solid #2a1515",borderRadius:10,padding:"12px",color:"#555",fontSize:13,gridColumn:"1/-1"}}>⚠️ Повне скидання</button>
      </div>
    </div>}

    {/* ════════════ HISTORY ════════════ */}
    {screen==="history"&&<div style={S.scr} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={S.ttl}>📜 Історія</div>
        <div style={{fontSize:11,color:"#555",fontFamily:"monospace"}}>{archive.length} спринт{archive.length===1?"":"ів"}</div>
      </div>

      {/* Загальна статистика */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <div style={{background:"rgba(200,168,64,0.08)",border:"1px solid rgba(200,168,64,0.25)",borderRadius:10,padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:700,color:"#c8a840"}}>{archive.length}</div>
          <div style={{fontSize:10,color:"#666",marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Завершених спринтів</div>
        </div>
        <div style={{background:"rgba(74,143,212,0.08)",border:"1px solid rgba(74,143,212,0.25)",borderRadius:10,padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:28,fontWeight:700,color:"#4a8fd4"}}>{archive.reduce((s,a)=>s+(a.manaTotal||0),0).toLocaleString()}</div>
          <div style={{fontSize:10,color:"#666",marginTop:2,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Мани зароблено</div>
        </div>
      </div>

      {archive.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:"#333"}}>
        <div style={{fontSize:40,marginBottom:12}}>📭</div>
        <div style={{fontSize:14,marginBottom:8}}>Архів порожній</div>
        <div style={{fontSize:12,color:"#2a2a2a",lineHeight:1.6}}>Завершені спринти зберігатимуться тут.<br/>Мана і досягнення нікуди не зникнуть.</div>
      </div>}

      {/* Архівні записи — від найновішого */}
      {[...archive].reverse().map((a,ri)=>{
        const i=archive.length-1-ri;
        const isOpen=histOpen===i;
        // Підрахувати середній грейд
        const allGrades=["A","B","C"].flatMap(pid=>a.projects[pid]?.gradeKeys||[]).filter(Boolean);
        const gradeScore={elite:4,solid:3,survive:2,reset:1};
        const avgScore=allGrades.length?allGrades.reduce((s,k)=>s+(gradeScore[k]||0),0)/allGrades.length:0;
        const overallGrade=avgScore>=3.5?"elite":avgScore>=2.5?"solid":avgScore>=1.5?"survive":"reset";

        return <div key={i} style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,overflow:"hidden"}}>
          {/* Header */}
          <button onClick={()=>setHistOpen(isOpen?null:i)}
            style={{width:"100%",background:"transparent",border:"none",padding:"14px 16px",textAlign:"left",color:"#f0ece4",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontFamily:"monospace",fontSize:11,color:"#c8a840",fontWeight:700}}>Спринт #{a.sprintNum}</span>
                <span style={{fontSize:16}}>{gradeEmoji[overallGrade]}</span>
                <span style={{fontSize:11,color:gradeColors[overallGrade]}}>{gradeLabel[overallGrade]}</span>
              </div>
              <div style={{fontSize:11,color:"#555"}}>{fmtDate(a.dateFinished)} · {(a.manaTotal||0).toLocaleString()} мани</div>
            </div>
            <div style={{fontSize:18,color:"#444"}}>{isOpen?"▲":"▼"}</div>
          </button>

          {/* Розгорнутий контент */}
          {isOpen&&<div style={{padding:"0 16px 16px",borderTop:"1px solid #1a1a1a"}}>
            {/* Оцінки тижнів */}
            <div style={{marginTop:14,marginBottom:14}}>
              <div style={S.cl}>Оцінки тижнів</div>
              <WeekGrades gradeKeys={a.projects?.A?.gradeKeys||[null,null,null]}/>
            </div>

            {/* Проекти */}
            {PROJECTS.map(p=>{
              const ap=a.projects?.[p.id];if(!ap)return null;
              return <div key={p.id} style={{marginBottom:10,padding:"10px 12px",background:p.bg,border:"1px solid "+p.border,borderRadius:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:ap.goal?6:0}}>
                  <div style={{fontSize:11,color:p.color,fontWeight:700}}>{p.short} {p.emoji} {ap.name!==p.label?ap.name:""}</div>
                  <div style={{display:"flex",gap:3}}>
                    {(ap.gradeKeys||[]).map((gk,gi)=>gk?<span key={gi} style={{fontSize:13}}>{gradeEmoji[gk]}</span>:<span key={gi} style={{fontSize:11,color:"#333"}}>·</span>)}
                  </div>
                </div>
                {ap.goal&&<div style={{fontSize:12,color:"#888",lineHeight:1.4}}>{ap.goal}</div>}
              </div>;
            })}
          </div>}
        </div>;
      })}

      {/* Поточний спринт якщо розпочато */}
      {g.sprintStarted&&<div style={{background:"rgba(200,168,64,0.06)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:12,padding:"14px 16px"}}>
        <div style={S.cl}>Поточний · Спринт #{g.sprintNum||1} · Тиждень {cw}/3</div>
        {PROJECTS.map(p=>{const proj=g.projects[p.id];return<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <span style={{fontSize:12,color:p.color,fontWeight:700}}>{p.short}</span>
          <span style={{fontSize:11,color:"#666",flex:1,marginLeft:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{proj.goal||"—"}</span>
          <div style={{display:"flex",gap:3,marginLeft:8}}>
            {proj.gradeKeys.map((gk,gi)=>gk?<span key={gi} style={{fontSize:13}}>{gradeEmoji[gk]}</span>:<span key={gi} style={{fontSize:10,color:"#333"}}>·</span>)}
          </div>
        </div>;})}
      </div>}
    </div>}

    {/* ════════════ SPRINT ════════════ */}
    {screen==="sprint"&&<div style={S.scr} className="fu">
      {!g.sprintStarted
        ?<div style={{textAlign:"center",padding:"40px 20px"}}>
          <div style={{fontSize:17,fontWeight:700,marginBottom:20}}>Запланувати спринт #{g.sprintNum||1}</div>
          <button style={S.gold} onClick={startPlan}>🚀 Почати планування</button>
        </div>
        :<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={S.ttl}>🎯 Спринт #{g.sprintNum||1}</div>
            <div style={{fontSize:11,color:"#555",fontFamily:"monospace"}}>Тиждень {cw}/3</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            {PROJECTS.map(p=><button key={p.id} onClick={()=>{setSprintTab(p.id);setExpandW(null);}}
              style={{flex:1,padding:"9px 4px",borderRadius:8,border:"2px solid "+(sprintTab===p.id?p.color:"transparent"),background:sprintTab===p.id?p.bg:"rgba(255,255,255,0.03)",color:sprintTab===p.id?p.color:"#555",fontSize:12,fontWeight:700}}>
              {p.short}<br/><span style={{fontSize:9,opacity:0.7}}>{p.emoji}</span>
            </button>)}
          </div>
          {PROJECTS.filter(p=>p.id===sprintTab).map(p=>{
            const proj=g.projects[p.id];
            return <div key={p.id}>
    
          {sprintTab==="A"&&<div style={{background:"#111",border:"1px solid #1e2028",borderRadius:12,padding:"12px 14px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#c8a840",textTransform:"uppercase"}}>🔁 Константи цього спринту</div>
              <button onClick={()=>setScreen("habits")} style={{fontSize:10,color:"#4a8fd4",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline"}}>трекер →</button>
            </div>
            {HABITS.map(h=>{
              const done=g.dailyHabits.includes(h.id);
              const streak=(g.habitStreak||{})[h.id]||0;
              const hdata=g.habits?.[h.id]||{content:"",note:""};
              return<div key={h.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #1a1a1a"}}>
                <div style={{width:18,height:18,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                  background:done?h.color:"transparent",border:"2px solid "+(done?h.color:"#2a2a2a"),fontSize:10}}>
                  {done&&<span style={{color:"#fff"}}>✓</span>}
                </div>
                <span style={{flexShrink:0}}>{h.emoji}</span>
                <div style={{flex:1}}>
                  <span style={{fontSize:11,fontWeight:700,color:done?h.color:h.color}}>{h.name}</span>
                  {hdata.content&&<div style={{fontSize:11,color:"#666",marginTop:1}}>{hdata.content}</div>}
                  {!hdata.content&&<div style={{fontSize:11,color:"#333",fontStyle:"italic",marginTop:1}}>{h.desc}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {streak>=2&&<div style={{fontSize:10,color:"#e8a44a"}}>🔥{streak}</div>}
                  <span style={{fontSize:10,color:done?"#4ab870":"#555",fontFamily:"monospace"}}>{done?"✓":"+"+h.mana}</span>
                </div>
              </div>;
            })}
          </div>}
          {proj.goal&&<div style={{background:p.bg,border:"1px solid "+p.border,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:10,color:p.color,fontFamily:"monospace",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>{p.emoji} {proj.name}</div>
                <div style={{fontSize:13,color:"#f0ece4",fontWeight:600,lineHeight:1.5,marginBottom:proj.why?8:0}}>{proj.goal}</div>
                {proj.why&&<div style={{fontSize:11,color:"#888",fontStyle:"italic",lineHeight:1.5,marginBottom:(proj.values||[]).length>0?8:0}}>💡 {proj.why}</div>}
                {(proj.values||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {(proj.values||[]).map(vid=>{const v=VALUES.find(x=>x.id===vid);return v?<span key={vid} style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"2px 8px",fontSize:10,color:p.color}}>{v.emoji} {v.label}</span>:null;})}</div>}
              </div>}
              {proj.weeks.map((w,wi)=>{
                const isCur=w.num===cw,isDone=!!proj.gradeKeys[wi],isLock=w.num>cw;
                const wDone=w.quests.filter(q=>q.done).length;
                const isExp=expandW===p.id+"_"+w.num||isCur;
                return <div key={wi} style={{background:"#161921",border:"1px solid "+(isCur?p.color:isDone?gradeColors[proj.gradeKeys[wi]]+"55":"#252a35"),borderRadius:12,padding:"14px 16px",opacity:isLock?0.5:1}}>
                  <button onClick={()=>setExpandW(isExp&&!isCur?null:p.id+"_"+w.num)}
                    style={{width:"100%",background:"transparent",border:"none",textAlign:"left",color:"#f0ece4",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:w.milestone?6:0}}>
                    <div>
                      <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:isCur?p.color:isDone?gradeColors[proj.gradeKeys[wi]]:"#555",marginBottom:3}}>
                        Тиждень {w.num} {isCur?"· Зараз":isDone?"· "+gradeEmoji[proj.gradeKeys[wi]]:isLock?"· Заблоковано":""}
                      </div>
                      {w.milestone&&<div style={{fontSize:12,color:"#888",lineHeight:1.4}}>{w.milestone}</div>}
                    </div>
                    {w.quests.length>0&&<div style={{fontFamily:"monospace",fontSize:11,color:isCur?p.color:"#555",flexShrink:0,marginLeft:10}}>{wDone}/{w.quests.length}</div>}
                  </button>
                  {isExp&&<div style={{marginTop:8}}>
                    {w.quests.map(q=><QItem key={q.id} q={q}
                      onAdd={isCur&&!isLock&&!isDone?()=>addWQToday(q,p.id):null}
                      onDel={!isDone&&!isLock?()=>removeQ(p.id,w.num,q.id):null}/>)}
                    {!isLock&&<div style={{marginTop:8}}>
                      {p.id==="D"&&g.todoist?.projects?.inbox&&isCur&&<button onClick={()=>syncInbox()} disabled={tdSyncing}
                        style={{width:"100%",background:"rgba(74,184,160,0.08)",border:"1px solid rgba(74,184,160,0.3)",borderRadius:8,padding:"8px",color:"#4ab8a0",fontSize:12,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {tdSyncing?"⏳ Завантажую...":"📥 Оновити Inbox з Todoist"}
                      </button>}
                      {p.id!=="D"&&g.todoist?.token&&g.todoist?.projects?.[p.id]&&isCur&&<button onClick={()=>syncFromTodoist(p.id)} disabled={tdSyncing}
                        style={{width:"100%",background:"rgba(232,68,74,0.08)",border:"1px solid rgba(232,68,74,0.3)",borderRadius:8,padding:"8px",color:"#e8444a",fontSize:12,marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                        {tdSyncing?"⏳ Завантажую...":"🔄 Завантажити з Todoist"}
                      </button>}
                      <div style={{display:"flex",gap:6,marginBottom:6}}>
                        <input style={{...S.inp,fontSize:12,padding:"8px 10px",flex:1}}
                          placeholder={"+ задача тижня "+w.num}
                          value={wqIn[p.id][wi]}
                          onChange={e=>{const n={...wqIn};n[p.id]=[...n[p.id]];n[p.id][wi]=e.target.value;setWqIn(n);}}
                          onKeyDown={e=>e.key==="Enter"&&addPlanQ(p.id,w.num)}/>
                        <button onClick={()=>addPlanQ(p.id,w.num)} style={{background:p.bg,border:"1px solid "+p.border,borderRadius:7,padding:"8px 12px",color:p.color,fontSize:14,fontWeight:700,flexShrink:0}}>+</button>
                      </div>
                      <ZonePick val={wqZn[p.id][wi]} onChange={v=>{const n={...wqZn};n[p.id]=[...n[p.id]];n[p.id][wi]=v;setWqZn(n);}}/>
                    </div>}
                  </div>}
                </div>;
              })}
            </div>;
          })}
        </>
      }
    </div>}

    {/* ════════════ PLANNING ════════════ */}
    {screen==="planning"&&<div style={S.scr} className="fu">
      <div style={{display:"flex",gap:3}}>
        {PROJECTS.map((p,pi)=>{const isDone=pi<planProjIdx;const isThis=p.id===planProjId;return<div key={p.id} style={{flex:1,height:4,borderRadius:2,background:isDone?p.color:isThis?p.color+"88":"#252a35",transition:"all 0.3s"}}/>;  })}
      </div>
      <div style={{fontSize:10,color:"#555",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>
        Проект {planProjIdx+1}/3 · {planProj.emoji} {planProj.short} · {planPhase==="goal"?"Ціль":planPhase==="milestones"?"Рубежі":"Квести тижнів"}
      </div>

      {planPhase==="goal"&&<>
        <div style={{background:planProj.bg,border:"1px solid "+planProj.border,borderRadius:12,padding:"16px"}}>
          <div style={{fontSize:22,marginBottom:8}}>{planProj.emoji}</div>
          <div style={{fontSize:16,fontWeight:700,color:planProj.color,marginBottom:4}}>{planProj.label}</div>
          <div style={{fontSize:12,color:"#666",marginBottom:14,lineHeight:1.6}}>{planProj.desc}</div>
          <div style={{fontSize:10,color:"#888",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Назва проекту (необов'язково)</div>
          <input style={{...S.inp,marginBottom:12}} placeholder={planProj.label}
            value={planDraft[planProjId].name}
            onChange={e=>setPlanDraft(p=>({...p,[planProjId]:{...p[planProjId],name:e.target.value}}))}/>
          <div style={{fontSize:10,color:"#888",marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Ціль спринту</div>
          <div style={{fontSize:12,color:"#555",marginBottom:8,lineHeight:1.6,fontStyle:"italic"}}>Що конкретно буде ЗРОБЛЕНО через 3 тижні?</div>
          <textarea style={{...S.inp,minHeight:65,resize:"vertical",lineHeight:1.6}}
            placeholder={planProjId==="A"?"Перший оплачений фріланс-клієнт":planProjId==="B"?"Ранковий ритуал 5/7 днів":"Прочитати 2 книги"}
            value={planDraft[planProjId].goal}
            onChange={e=>setPlanDraft(p=>({...p,[planProjId]:{...p[planProjId],goal:e.target.value}}))}/>
          <div style={{fontSize:10,color:"#888",marginTop:14,marginBottom:5,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Для чого мені це? Що я матиму?</div>
          <div style={{fontSize:12,color:"#555",marginBottom:8,lineHeight:1.6,fontStyle:"italic"}}>Мотивація та користь — особисто для тебе</div>
          <textarea style={{...S.inp,minHeight:55,resize:"vertical",lineHeight:1.6}}
            placeholder="Матиму перший дохід від фрілансу, впевненість, що я можу..."
            value={planDraft[planProjId].why}
            onChange={e=>setPlanDraft(p=>({...p,[planProjId]:{...p[planProjId],why:e.target.value}}))}/>
          <div style={{fontSize:10,color:"#888",marginTop:14,marginBottom:8,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>Яка цінність чіпляється?</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {VALUES.map(v=>{
              const sel=(planDraft[planProjId].values||[]).includes(v.id);
              return <button key={v.id} onClick={()=>{
                const cur=planDraft[planProjId].values||[];
                const next=sel?cur.filter(x=>x!==v.id):[...cur,v.id];
                setPlanDraft(p=>({...p,[planProjId]:{...p[planProjId],values:next}}));
              }} style={{display:"flex",alignItems:"center",gap:10,background:sel?planProj.bg:"rgba(255,255,255,0.03)",border:"1px solid "+(sel?planProj.border:"#252a35"),borderRadius:9,padding:"9px 12px",textAlign:"left",color:"#f0ece4"}}>
                <div style={{width:20,height:20,borderRadius:"50%",border:"2px solid "+(sel?planProj.color:"#333"),background:sel?planProj.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                  {sel&&<span style={{fontSize:11,color:"#fff"}}>✓</span>}
                </div>
                <span style={{fontSize:14,flexShrink:0}}>{v.emoji}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:sel?planProj.color:"#f0ece4"}}>{v.label}</div>
                  <div style={{fontSize:10,color:"#555"}}>{v.desc}</div>
                </div>
              </button>;
            })}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={planProjIdx===0?()=>setScreen("home"):()=>{const prev=PROJECTS[planProjIdx-1].id;setPlanProjId(prev);setPlanPhase("quests");setPlanQWeek(3);}} style={{flex:1,background:"transparent",border:"1px solid #333",borderRadius:8,padding:"11px",color:"#777",fontSize:13}}>← Назад</button>
          <button disabled={!planDraft[planProjId].goal.trim()} onClick={()=>setPlanPhase("milestones")}
            style={{...S.gold,flex:2,opacity:planDraft[planProjId].goal.trim()?1:0.4}}>Рубежі тижнів →</button>
        </div>
      </>}

      {planPhase==="milestones"&&<>
        <div style={S.card}>
          <div style={{fontSize:18,marginBottom:8}}>{["3️⃣","2️⃣","1️⃣"][planMStep]}</div>
          <div style={{fontSize:15,fontWeight:700,color:planProj.color,marginBottom:4}}>{ms.label}</div>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8,lineHeight:1.5,whiteSpace:"pre-line"}}>{ms.q}</div>
          <div style={{fontSize:12,color:"#555",marginBottom:12,lineHeight:1.6,fontStyle:"italic"}}>{ms.hint}</div>
          <textarea style={{...S.inp,minHeight:65,resize:"vertical",lineHeight:1.6}}
            value={planDraft[planProjId][ms.key]}

      {planPhase==="quests"&&<>

          </div>;})}
        </div>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{if(planQWeek>1)setPlanQWeek(n=>n-1);else setPlanPhase("milestones");}} style={{flex:1,background:"transparent",border:"1px solid #333",borderRadius:8,padding:"11px",color:"#777",fontSize:13}}>← Назад</button>

            ?<button onClick={()=>setPlanQWeek(n=>n+1)} style={{...S.gold,flex:2}}>Тиждень {planQWeek+1} →</button>
            :<button onClick={()=>{applyDraft(planProjId);finishPlanProj();}} style={{...S.gold,flex:2,background:planProj.color}}>

      </>}
    </div>}

    {/* ════════════ PLANNING — HABITS ════════════ */}
    {screen==="planning"&&planPhase==="habits"&&<div style={S.scr} className="fu">
      {/* Progress bar — 4 projects done */}
      <div style={{display:"flex",gap:3}}>
        {PROJECTS.map((p)=><div key={p.id} style={{flex:1,height:4,borderRadius:2,background:p.color}}/>)}
        <div style={{flex:1,height:4,borderRadius:2,background:"#c8a840"}}/>
      </div>
      <div style={{fontSize:10,color:"#555",fontFamily:"monospace",textTransform:"uppercase",letterSpacing:"0.1em"}}>
        Останній крок · 🔁 Щоденні константи
      </div>

      <div style={{background:"rgba(200,168,64,0.06)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:12,padding:"14px 16px"}}>

        <div style={{fontSize:12,color:"#666",lineHeight:1.7}}>
          Ці 4 звички — постійні, незалежно від спринту.<br/>

        </div>
      </div>

      {HABITS.map(h=>{
        return <div key={h.id} style={{background:"#161921",border:"1px solid "+h.color+"44",borderRadius:12,padding:"14px 16px"}}>

            <span style={{fontSize:24}}>{h.emoji}</span>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:h.color}}>{h.name}</div>
              <div style={{fontSize:11,color:"#555"}}>{h.desc} · <span style={{color:"#c8a840"}}>+{h.mana} мани/день</span></div>
            </div>
          </div>
          <input
            style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid "+h.color+"44",borderRadius:7,padding:"10px 12px",color:"#f0ece4",fontSize:13,fontFamily:"inherit",outline:"none"}}
            placeholder={h.placeholder}
            value={habitDraft[h.id]}
            onChange={e=>setHabitDraft(p=>({...p,[h.id]:e.target.value}))}/>
          <div style={{fontSize:10,color:"#333",marginTop:5}}>
            Якщо залишити порожнім — показуватиметься опис за замовчуванням
          </div>
        </div>;
      })}

      <div style={{background:"#0a0c10",border:"1px solid #1a1a1a",borderRadius:10,padding:"12px 14px"}}>
        <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#c8a840",textTransform:"uppercase",marginBottom:8}}>Потенціал за день</div>
        <div style={{display:"flex",gap:6}}>
          {[
            {label:"Константи",val:HABITS.reduce((s,h)=>s+h.mana,0),c:"#4ab870"},
            {label:"A-квест",val:"20-60",c:"#c8a840"},
            {label:"Мікро x3",val:90,c:"#4a8fd4"},
          ].map((item,i)=><div key={i} style={{flex:1,textAlign:"center",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 4px"}}>
            <div style={{fontSize:14,fontWeight:700,color:item.c}}>{item.val}</div>
            <div style={{fontSize:9,color:"#444",marginTop:2}}>{item.label}</div>
          </div>)}
        </div>
      </div>

      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>{setPlanPhase("quests");setPlanProjId("C");setPlanQWeek(3);}} style={{flex:1,background:"transparent",border:"1px solid #333",borderRadius:8,padding:"11px",color:"#777",fontSize:13}}>← Назад</button>
        <button onClick={()=>{
          // Save habit drafts
          upd(prev=>({...prev,habits:{
            habit:  {content:habitDraft.habit,  note:""},
            morning:{content:habitDraft.morning, note:""},
            evening:{content:habitDraft.evening, note:""},
          }}));
          launchSprint();
        }} style={{...S.gold,flex:2}}>🚀 Запустити спринт!</button>
      </div>

    {/* ════════════ MORNING ════════════ */}
    {screen==="morning"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>🌅 Ранковий ритуал</div>

      <div style={S.card}>
        <div style={S.cl}>Шкала Body Battery</div>
        {BB_RANGES.map(r=><div key={r.range} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",borderRadius:8,marginBottom:2,background:bbPreview?.label===r.label?r.color+"18":"transparent",border:bbPreview?.label===r.label?"1px solid "+r.color+"44":"1px solid transparent",transition:"all 0.2s"}}>
          <span style={{fontSize:18,flexShrink:0}}>{r.emoji}</span>
          <span style={{fontFamily:"monospace",fontSize:11,color:r.color,minWidth:52}}>{r.range}</span>
          <span style={{fontSize:13,color:bbPreview?.label===r.label?r.color:"#777",fontWeight:bbPreview?.label===r.label?700:400}}>{r.label}</span>
          {bbPreview?.label===r.label&&<span style={{marginLeft:"auto",fontSize:11,color:r.color}}>← ти тут</span>}
        </div>)}
      </div>
      <div style={S.card}>
        <div style={S.cl}>Введи Body Battery</div>

            style={{...S.inp,fontSize:36,fontWeight:700,textAlign:"center",padding:"14px",color:bbPreview?.color||"#f0ece4",border:"2px solid "+(bbPreview?.color||"#2a2820"),background:bbPreview?bbPreview.bg:"rgba(255,255,255,0.05)",transition:"all 0.3s",flex:1}}

          {bbPreview&&<div style={{fontSize:56,flexShrink:0}}>{bbPreview.emoji}</div>}
        </div>

        </div>}

          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontWeight:700,color:m.color,fontSize:15}}>{m.emoji} {m.label}</span><span style={{fontFamily:"monospace",color:"#c8a840",fontWeight:700}}>x{m.mult}</span></div>

          {!avail&&<div style={{fontSize:11,color:"#e05555",marginTop:3}}>⛔ Недоступно при BB {g.energy.range}</div>}
        </button>;})}
      </div>}
      {g.energy&&g.mode&&<>
        <div style={{background:"rgba(200,168,64,0.07)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:10,padding:"14px"}}>

            </div>)}
          </div>
        </div>
        <div style={S.ok}>✅ Готово! Переходь до Квестів</div>
      </>}
    </div>}

    {/* ════════════ QUESTS ════════════ */}
    {screen==="quests"&&<div style={S.scr} className="fu">

      {/* Заголовок + лічильник */}

        {tc>0&&<div style={{fontFamily:"monospace",fontSize:13,color:"#c8a840",fontWeight:700}}>{dc}/{tc}</div>}
      </div>

      {/* ══ РИТУАЛ ЗАПУСКУ ══ */}
      <div style={{background:ritualOk?"rgba(74,184,112,0.06)":"rgba(200,168,64,0.06)",border:"1px solid "+(ritualOk?"rgba(74,184,112,0.3)":"rgba(200,168,64,0.2)"),borderRadius:12,padding:"12px 14px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ritualOk?0:10}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:ritualOk?"#4ab870":"#c8a840"}}>
            {ritualOk?"🔥 Ритуал виконано":"⚡ Ритуал запуску"}

          {RITUAL.map(s=><button key={s.id} onClick={()=>setRitual(p=>({...p,[s.id]:!p[s.id]}))}

              {ritual[s.id]&&<span style={{color:"#0d0f14",fontWeight:700}}>✓</span>}

            <span style={{fontSize:14,flexShrink:0}}>{s.emoji}</span>
            <div>
              <div style={{fontSize:12,fontWeight:600,color:ritual[s.id]?"#4ab870":"#f0ece4"}}>{s.label}</div>
              <div style={{fontSize:11,color:"#555",marginTop:1}}>{s.desc}</div>
            </div>
          </button>)}
        </div>}
      </div>

      <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:g.dailyQuests.length>0?12:0}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:"#c8a840"}}>Сьогодні</div>
          <div style={{fontFamily:"monospace",fontSize:12,color:dc===tc&&tc>0?"#4ab870":"#c8a840"}}>{dc}/{tc}</div>
        </div>
        {g.dailyQuests.length===0&&<div style={{textAlign:"center",color:"#3a3a3a",padding:"16px 0",fontSize:13}}>

        {[...g.dailyQuests].sort((a,b)=>a.done-b.done).map(q=><QItem key={q.id} q={q} showProj

          onDel={()=>upd(p=>({...p,dailyQuests:p.dailyQuests.filter(x=>x.id!==q.id)}))}/>)}
      </div>

      {/* ══ ПУЛИ ЗАДАЧ — акордеони ══ */}

      {/* Константи */}

          style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",color:"#f0ece4",textAlign:"left"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>🔁</span>
            <span style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"#c8a840"}}>Константи</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:g.dailyHabits.length===HABITS.length?"#4ab870":"#555"}}>{g.dailyHabits.length}/{HABITS.length}</span>
            <span style={{fontSize:12,color:"#444"}}>{questPoolOpen==="habits"?"▲":"▼"}</span>
          </div>
        </button>
        {questPoolOpen==="habits"&&<div style={{padding:"0 14px 12px",borderTop:"1px solid #1e2028"}}>
          {HABITS.map(h=>{
            const done=g.dailyHabits.includes(h.id);
            const streak=(g.habitStreak||{})[h.id]||0;
            return <div key={h.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #111"}}>
              <button onClick={()=>!done&&doneHabit(h.id)}
                style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:done?h.color:"transparent",border:"2px solid "+(done?h.color:"#333"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>
                {done&&<span style={{color:"#fff"}}>✓</span>}
              </button>
              <span style={{fontSize:16,flexShrink:0}}>{h.emoji}</span>
              <div style={{flex:1,fontSize:12,color:done?"#555":"#f0ece4",textDecoration:done?"line-through":"none"}}>{h.name}</div>
              {streak>=2&&<span style={{fontSize:11,color:"#e8a44a"}}>🔥{streak}</span>}
              <span style={{fontFamily:"monospace",fontSize:11,color:done?"#4ab870":"#555"}}>{done?"✓":"+"+h.mana}</span>
            </div>;
          })}
          <button onClick={()=>setScreen("habits")} style={{marginTop:8,fontSize:11,color:"#4a8fd4",background:"transparent",border:"none",cursor:"pointer"}}>детальний трекер →</button>
        </div>}
      </div>

      {/* Проекти A/B/C/D */}
      {g.sprintStarted&&PROJECTS.map(p=>{
        const pool=(g.projects[p.id]?.weeks[cw-1]?.quests||[]).filter(q=>!q.done&&!g.dailyQuests.find(d=>d.weekQuestId===q.id));
        const isOpen=questPoolOpen===p.id;
        const totalWeek=(g.projects[p.id]?.weeks[cw-1]?.quests||[]).length;
        const doneWeek=(g.projects[p.id]?.weeks[cw-1]?.quests||[]).filter(q=>q.done).length;
        return <div key={p.id} style={{background:"#161921",border:"1px solid "+(isOpen?p.border:"#252a35"),borderRadius:12,overflow:"hidden",transition:"border 0.2s"}}>
          <button onClick={()=>setQuestPoolOpen(isOpen?null:p.id)}
            style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",color:"#f0ece4",textAlign:"left"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14}}>{p.emoji}</span>
              <span style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:p.color}}>{p.short} · {p.label.split("·")[1]?.trim()||p.label}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {totalWeek>0&&<span style={{fontFamily:"monospace",fontSize:11,color:doneWeek===totalWeek?"#4ab870":p.color}}>{doneWeek}/{totalWeek}</span>}
              {pool.length>0&&<span style={{background:p.color+"22",borderRadius:10,padding:"2px 7px",fontSize:10,color:p.color,fontWeight:700}}>{pool.length}</span>}
              <span style={{fontSize:12,color:"#444"}}>{isOpen?"▲":"▼"}</span>
            </div>
          </button>
          {isOpen&&<div style={{padding:"0 14px 12px",borderTop:"1px solid #1e2028"}}>
            {pool.length===0&&<div style={{textAlign:"center",color:"#3a3a3a",padding:"12px 0",fontSize:12}}>
              {p.id==="D"?"Inbox порожній":"Всі задачі тижня вже додані або виконані"}
            </div>}
            {pool.map(q=><QItem key={q.id} q={q} onAdd={g.energy&&g.mode?()=>addWQToday(q,p.id):null}/>)}
            {p.id==="D"&&g.todoist?.projects?.inbox&&<button onClick={()=>syncInbox()} disabled={tdSyncing}
              style={{width:"100%",marginTop:8,background:"rgba(74,184,160,0.08)",border:"1px solid rgba(74,184,160,0.3)",borderRadius:7,padding:"7px",color:"#4ab8a0",fontSize:11}}>
              {tdSyncing?"⏳":"🔄"} Оновити Inbox
            </button>}
            {!g.energy&&<div style={{fontSize:11,color:"#666",marginTop:8,textAlign:"center"}}>Введи BB щоб додати квест</div>}
          </div>}
        </div>;
      })}

      {/* + Своя задача */}
      <div style={{background:"#161921",border:"1px solid "+(questPoolOpen==="add"?"#c8a840":"#252a35"),borderRadius:12,overflow:"hidden"}}>
        <button onClick={()=>setQuestPoolOpen(questPoolOpen==="add"?null:"add")}
          style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"transparent",border:"none",color:"#f0ece4",textAlign:"left"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:14}}>✏️</span>
            <span style={{fontFamily:"monospace",fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:"#c8a840"}}>Своя задача</span>
          </div>
          <span style={{fontSize:12,color:"#444"}}>{questPoolOpen==="add"?"▲":"▼"}</span>
        </button>
        {questPoolOpen==="add"&&<div style={{padding:"0 14px 14px",borderTop:"1px solid #1e2028"}}>
          {(!g.energy||!g.mode)
            ?<div style={{color:"#666",fontSize:12,padding:"10px 0",textAlign:"center"}}>⚠️ Спочатку введи BB у Ранковому ритуалі</div>
            :<>
              <div style={{display:"flex",gap:6,marginBottom:10,marginTop:10}}>
                {PROJECTS.map(p=><button key={p.id} onClick={()=>setQProjId(p.id)}
                  style={{flex:1,padding:"6px 3px",borderRadius:7,border:"2px solid "+(qProjId===p.id?p.color:"transparent"),background:qProjId===p.id?p.bg:"rgba(255,255,255,0.04)",color:qProjId===p.id?p.color:"#555",fontSize:11,fontWeight:700}}>
                  {p.short} {p.emoji}
                </button>)}
              </div>
              <input style={{...S.inp,marginBottom:8}} placeholder="Мікрокрок..." value={qName}
                onChange={e=>setQName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryAdd()}/>
              <ZonePick val={qZone} onChange={setQZone}/>
              {qName.trim()&&<div style={{fontSize:12,color:"#c8a840",margin:"8px 0"}}>💰 <b style={{fontSize:16}}>{calcMana(qZone,g.energy,g.mode)}</b> мани</div>}
              <button style={{...S.gold,marginTop:8}} onClick={tryAdd}>Додати квест</button>
            </>
          }
        </div>}
      </div>

      {/* Активатори */}
      <button onClick={()=>setShowActivators(true)}
        style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(74,143,212,0.06)",border:"1px solid rgba(74,143,212,0.2)",borderRadius:10,padding:"10px 14px",color:"#4a8fd4",fontSize:12,width:"100%"}}>
        ⚡ Нема енергії — активатори
      </button>

    </div>}

    {/* ════════════ LANG ════════════ */}
    {screen==="lang"&&(()=>{
      const ls=g.langSession||{};
      const lang=activeLang;
      const langData=ls[lang]||{};
      const blocks=langData.blocks||[];
      const todayDone=langData.todayDone||{};
      const todayPicks=langData.todayPicks||{};
      const streak=langData.streak||0;
      const history=langData.history||{};
      const today=new Date().toISOString().slice(0,10);
      const days=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().slice(0,10);});
      const doneCnt=blocks.filter(b=>todayDone[b.id]).length;
      const totalMins=blocks.reduce((s,b)=>s+b.minutes,0);
      const totalMana=blocks.reduce((s,b)=>s+b.mana,0);
      const langMeta={fr:{flag:"🇫🇷",name:"Французька"},uk:{flag:"🇺🇦",name:"Українська"}};

      const doneBlock=(blockId,mana)=>{
        upd(prev=>{
          const pls={...prev.langSession};
          const pl={...pls[lang]};
          const wasDone={...pl.todayDone,[blockId]:true};
          pl.todayDone=wasDone;
          const hist={...pl.history};
          hist[today]={...hist[today],[blockId]:true};
          pl.history=hist;
          const allDone=pl.blocks.every(b=>wasDone[b.id]);
          if(allDone){
            const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
            pl.streak=(pl.lastDate===yesterday?(pl.streak||0)+1:1);
            pl.lastDate=today;
          }
          pls[lang]=pl;
          return{...prev,mana:prev.mana+mana,langSession:pls};
        });
      };

      const pickOption=(blockId,optId)=>{
        upd(prev=>{
          const pls={...prev.langSession};
          const pl={...pls[lang]};
          const cur=pl.todayPicks||{};
          pl.todayPicks={...cur,[blockId]:cur[blockId]===optId?null:optId};
          pls[lang]=pl;
          return{...prev,langSession:pls};
        });
      };

      return <div style={S.scr} className="fu">
        {/* Заголовок + перемикач мов */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={S.ttl}>🗣️ Мова</div>
          {streak>=2&&<div style={{fontFamily:"monospace",fontSize:13,color:"#e8a44a",fontWeight:700}}>🔥{streak}</div>}
        </div>

        {/* Перемикач 🇫🇷 / 🇺🇦 */}
        <div style={{display:"flex",gap:6}}>
          {["fr","uk"].map(l=><button key={l} onClick={()=>setActiveLang(l)}
            style={{flex:1,padding:"10px",borderRadius:10,border:"2px solid "+(lang===l?"#c8a840":"#252a35"),
              background:lang===l?"rgba(200,168,64,0.1)":"rgba(255,255,255,0.03)",
              color:lang===l?"#c8a840":"#555",fontSize:15,fontWeight:700}}>
            {langMeta[l].flag} {langMeta[l].name}
          </button>)}
        </div>

        {/* Прогрес сесії */}
        <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",
              color:doneCnt===blocks.length&&blocks.length>0?"#4ab870":"#c8a840"}}>
              {doneCnt===blocks.length&&blocks.length>0?"✓ Сесія виконана":"Сесія сьогодні"}
            </div>
            <div style={{fontFamily:"monospace",fontSize:12,color:doneCnt===blocks.length&&blocks.length>0?"#4ab870":"#888"}}>
              {doneCnt}/{blocks.length} · {totalMins} хв · +{totalMana} мани
            </div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {blocks.map(b=><div key={b.id} style={{flex:1,height:6,borderRadius:3,
              background:todayDone[b.id]?"#4ab870":"#252a35",transition:"background 0.3s"}}/>)}
          </div>
        </div>

        {/* Тижнева сітка */}
        <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#555",textTransform:"uppercase",marginBottom:12}}>Тиждень · останні 7 днів</div>
          <div style={{display:"grid",gridTemplateColumns:"72px repeat(7,1fr)",gap:3,marginBottom:6}}>
            <div/>
            {days.map(d=>{const isToday=d===today;const dd=new Date(d);return <div key={d} style={{textAlign:"center",fontSize:9,color:isToday?"#c8a840":"#444",fontFamily:"monospace",fontWeight:isToday?700:400}}>
              {["Нд","Пн","Вт","Ср","Чт","Пт","Сб"][dd.getDay()]}<br/><span style={{fontSize:8}}>{dd.getDate()}</span>
            </div>;})}
          </div>
          {blocks.map(b=><div key={b.id} style={{display:"grid",gridTemplateColumns:"72px repeat(7,1fr)",gap:3,marginBottom:5,alignItems:"center"}}>
            <div style={{fontSize:10,color:"#c8a840",fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.emoji} {b.name}</div>
            {days.map(d=>{const isToday=d===today;const isDone=isToday?todayDone[b.id]:history[d]?.[b.id];
              return <div key={d} style={{height:20,borderRadius:4,background:isDone?"#4ab870":"#111",
                border:"1px solid "+(isToday&&!isDone?"#333":"transparent"),
                boxShadow:isToday&&isDone?"0 0 6px #4ab87088":"none",transition:"all 0.3s"}}/>;
            })}
          </div>)}
          <div style={{display:"grid",gridTemplateColumns:"72px repeat(7,1fr)",gap:3,marginTop:6,borderTop:"1px solid #1a1a1a",paddingTop:6}}>
            <div style={{fontSize:9,color:"#444",fontFamily:"monospace"}}>всього</div>
            {days.map(d=>{const isToday=d===today;
              const cnt=isToday?blocks.filter(b=>todayDone[b.id]).length:blocks.filter(b=>history[d]?.[b.id]).length;
              const all=blocks.length;
              return <div key={d} style={{textAlign:"center",fontSize:9,fontFamily:"monospace",
                color:cnt===all&&all>0?"#4ab870":cnt>0?"#c8a840":"#333",fontWeight:cnt>0?700:400}}>
                {cnt>0?cnt+"/"+all:"·"}
              </div>;
            })}
          </div>
        </div>

        {/* Блоки конструктора */}
        {blocks.map(block=>{
          const picked=todayPicks[block.id];
          const done=todayDone[block.id];
          return <div key={block.id} style={{background:"#161921",border:"1px solid "+(done?"rgba(74,184,112,0.4)":picked?"rgba(200,168,64,0.3)":"#252a35"),borderRadius:12,padding:"14px 16px",transition:"border 0.2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>{block.emoji}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:done?"#4ab870":picked?"#c8a840":"#f0ece4"}}>{block.name}</div>
                  <div style={{fontSize:11,color:"#555"}}>{block.minutes} хв · +{block.mana} мани</div>
                </div>
              </div>
              {done&&<span style={{fontSize:20}}>✅</span>}
            </div>

            {!done&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {block.options.map(opt=>{
                const isSel=picked===opt.id;
                return <button key={opt.id} onClick={()=>pickOption(block.id,opt.id)}
                  style={{display:"flex",alignItems:"flex-start",gap:10,background:isSel?"rgba(200,168,64,0.1)":"rgba(255,255,255,0.03)",
                    border:"1px solid "+(isSel?"rgba(200,168,64,0.5)":"#1e2028"),borderRadius:9,padding:"10px 12px",textAlign:"left",color:"#f0ece4"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,marginTop:1,
                    background:isSel?"#c8a840":"transparent",border:"2px solid "+(isSel?"#c8a840":"#333"),
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:10}}>
                    {isSel&&<span style={{color:"#0d0f14",fontWeight:700}}>✓</span>}
                  </div>
                  <span style={{fontSize:12,lineHeight:1.5,color:isSel?"#f0ece4":"#888"}}>{opt.text}</span>
                </button>;
              })}
            </div>}

            {done&&picked&&<div style={{background:"rgba(74,184,112,0.08)",border:"1px solid rgba(74,184,112,0.2)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#4ab870",lineHeight:1.5}}>
              ✓ {block.options.find(o=>o.id===picked)?.text||"виконано"}
            </div>}

            {!done&&picked&&<button onClick={()=>{doneBlock(block.id,block.mana);toast_(block.emoji+" "+block.name+" +"+block.mana+" мани!","#c8a840");}}
              style={{...S.gold,marginTop:10,padding:"10px"}}>
              ✓ Виконала · +{block.mana} мани
            </button>}

            {!done&&!picked&&<div style={{fontSize:11,color:"#333",marginTop:4,textAlign:"center"}}>↑ Обери варіант</div>}
          </div>;
        })}

        <div style={{fontSize:11,color:"#2a2a2a",textAlign:"center",lineHeight:1.6}}>
          💡 Обери варіант у кожному блоці і виконай по порядку
        </div>
      </div>;
    })()}
    {/* ════════════ HABITS ════════════ */}
    {screen==="habits"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>🔁 Щоденні константи</div>

      {/* Сьогоднішній прогрес */}
      <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#555",textTransform:"uppercase"}}>Сьогодні</div>
          <div style={{fontFamily:"monospace",fontSize:12,color:"#c8a840"}}>{g.dailyHabits.length}/{HABITS.length} · +{g.dailyHabits.reduce((s,hid)=>{const h=HABITS.find(x=>x.id===hid);return s+(h?.mana||0);},0)} мани</div>
        </div>
        {HABITS.map(h=>{
          const done=g.dailyHabits.includes(h.id);
          const streak=(g.habitStreak||{})[h.id]||0;
          const hdata=g.habits?.[h.id]||{content:""};
          return <button key={h.id} onClick={()=>!done&&doneHabit(h.id)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:"12px 10px",borderRadius:10,
              background:done?"rgba(74,184,112,0.08)":"rgba(255,255,255,0.02)",
              border:"1px solid "+(done?"rgba(74,184,112,0.3)":"#252a35"),
              marginBottom:8,textAlign:"left",color:"#f0ece4",cursor:done?"default":"pointer",
              transition:"all 0.2s"}}>
            {/* Чекбокс */}
            <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
              background:done?h.color:"transparent",border:"2px solid "+(done?h.color:"#333"),transition:"all 0.2s"}}>
              {done&&<span style={{color:"#fff",fontSize:14}}>✓</span>}
            </div>
            {/* Інфо */}
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                <span style={{fontSize:14}}>{h.emoji}</span>
                <span style={{fontSize:13,fontWeight:700,color:done?h.color:"#f0ece4"}}>{h.name}</span>
              </div>
              {hdata.content
                ?<div style={{fontSize:11,color:"#666"}}>{hdata.content}</div>
                :<div style={{fontSize:11,color:"#333",fontStyle:"italic"}}>{h.desc}</div>}
            </div>
            {/* Streak + мана */}
            <div style={{textAlign:"right",flexShrink:0}}>
              {streak>=2&&<div style={{fontSize:11,color:"#e8a44a",fontWeight:700,marginBottom:2}}>🔥{streak}</div>}
              <div style={{fontFamily:"monospace",fontSize:11,color:done?"#4ab870":"#555"}}>
                {done?"✓":"+"+h.mana}
              </div>
            </div>
          </button>;
        })}
      </div>

      {/* Тижневий трекер — сітка 7 днів */}
      {(()=>{
        const today=new Date().toISOString().slice(0,10);
        const days=Array.from({length:7},(_,i)=>{
          const d=new Date(Date.now()-i*86400000);
          return d.toISOString().slice(0,10);
        }).reverse();
        return <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#555",textTransform:"uppercase",marginBottom:12}}>Тиждень · останні 7 днів</div>
          {/* Заголовки дат */}
          <div style={{display:"grid",gridTemplateColumns:"80px repeat(7,1fr)",gap:3,marginBottom:6}}>
            <div/>
            {days.map(d=>{
              const isToday=d===today;
              const dd=new Date(d);
              return <div key={d} style={{textAlign:"center",fontSize:9,color:isToday?"#c8a840":"#444",fontFamily:"monospace",fontWeight:isToday?700:400}}>
                {["Нд","Пн","Вт","Ср","Чт","Пт","Сб"][dd.getDay()]}<br/>
                <span style={{fontSize:8}}>{dd.getDate()}</span>
              </div>;
            })}
          </div>
          {/* Рядки звичок */}
          {HABITS.map(h=>{
            const weekDone=days.filter(d=>(g.habitHistory?.[d]||[]).includes(h.id)).length;
            return <div key={h.id} style={{display:"grid",gridTemplateColumns:"80px repeat(7,1fr)",gap:3,marginBottom:5,alignItems:"center"}}>
              <div style={{fontSize:10,color:h.color,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.emoji} {h.name}</div>
              {days.map(d=>{
                const isToday=d===today;
                const done=(g.habitHistory?.[d]||[]).includes(h.id);
                const isTodayDone=isToday&&g.dailyHabits.includes(h.id);
                const isDone=done||isTodayDone;
                return <div key={d} style={{height:20,borderRadius:4,
                  background:isDone?h.color:"#111",
                  border:"1px solid "+(isToday&&!isDone?"#333":"transparent"),
                  opacity:isToday?1:0.85,
                  boxShadow:isToday&&isDone?"0 0 6px "+h.color+"88":"none",
                  transition:"all 0.3s"}}/>;
              })}
              <div style={{display:"none"}}/>
            </div>;
          })}
          {/* Підсумок рядок */}
          <div style={{display:"grid",gridTemplateColumns:"80px repeat(7,1fr)",gap:3,marginTop:6,borderTop:"1px solid #1a1a1a",paddingTop:6}}>
            <div style={{fontSize:9,color:"#444",fontFamily:"monospace"}}>всього</div>
            {days.map(d=>{
              const isToday=d===today;
              const cnt=isToday?g.dailyHabits.length:(g.habitHistory?.[d]||[]).length;
              const all=HABITS.length;
              return <div key={d} style={{textAlign:"center",fontSize:9,fontFamily:"monospace",
                color:cnt===all?"#4ab870":cnt>0?"#c8a840":"#333",fontWeight:cnt>0?700:400}}>
                {cnt>0?cnt+"/"+all:"·"}
              </div>;
            })}
          </div>
        </div>;
      })()}

      {/* Статистика спринту */}
      {g.sprintStarted&&(()=>{
        const sprintStats=HABITS.map(h=>{
          const allDays=Object.keys(g.habitHistory||{});
          const doneDays=allDays.filter(d=>(g.habitHistory[d]||[]).includes(h.id)).length;
          const streak=(g.habitStreak||{})[h.id]||0;
          const sprintDay=effectiveSprintDay||1;
          const pct=sprintDay>0?Math.round(doneDays/sprintDay*100):0;
          return{...h,doneDays,streak,pct};
        });
        return <div style={{background:"#161921",border:"1px solid #252a35",borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:"0.15em",color:"#555",textTransform:"uppercase",marginBottom:12}}>Статистика спринту</div>
          {sprintStats.map(h=><div key={h.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:4}}>
              <span style={{color:h.color,fontWeight:700}}>{h.emoji} {h.name}</span>
              <span style={{fontFamily:"monospace",color:"#555"}}>
                {h.streak>=2&&<span style={{color:"#e8a44a",marginRight:6}}>🔥{h.streak} серія</span>}
                {h.doneDays} дн · {h.pct}%
              </span>
            </div>
            <div style={{height:4,background:"#111",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:h.pct+"%",background:"linear-gradient(90deg,"+h.color+"66,"+h.color+")",borderRadius:2,transition:"width 0.5s"}}/>
            </div>
          </div>)}
        </div>;
      })()}

    </div>}

    {/* ════════════ MICRO ════════════ */}
    {screen==="micro"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>🆘 Мікро-режим</div>
      <div style={{background:"rgba(224,85,85,0.1)",border:"1px solid rgba(224,85,85,0.3)",borderRadius:8,padding:"12px 14px",color:"#e05555",fontSize:13,lineHeight:1.6}}>Коли BB дуже низький або не можеш почати.<br/><b>3 дії = день виконано ✅</b></div>
      <div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:13,color:"#666"}}>Виконано</div><div style={{fontFamily:"monospace",fontSize:13,color:"#4ab870"}}>{g.microDone.length}/8 · +{g.microDone.length*30} мани</div></div>
      <div style={{height:4,background:"#1a1a1a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:(g.microDone.length/8*100)+"%",background:"#4ab870",borderRadius:2,transition:"width 0.4s"}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {MICRO.map(m=>{const done=g.microDone.includes(m.name);return<button key={m.name} onClick={()=>doMicro(m)} disabled={done} style={{borderRadius:12,border:"1px solid "+(done?"rgba(74,184,112,0.4)":"#252a35"),padding:"15px 10px",textAlign:"center",background:done?"rgba(74,184,112,0.1)":"rgba(255,255,255,0.03)",color:"#f0ece4",opacity:done?0.6:1}}>
          <div style={{fontSize:27,marginBottom:5}}>{m.emoji}</div>
          <div style={{fontSize:12,fontWeight:600,marginBottom:3}}>{m.name}</div>
          <div style={{fontSize:12,fontFamily:"monospace",color:done?"#4ab870":"#c8a840"}}>{done?"✓":"+"+m.mana}</div>
        </button>;})}
      </div>
      {g.microDone.length>=3&&<div style={S.ok}>🎉 День виконано! Ти зробила головне.</div>}
    </div>}

    {/* ════════════ SHOP ════════════ */}
    {screen==="shop"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>🛒 Крамниця</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(200,168,64,0.08)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:10,padding:"14px 16px"}}>
        <div style={{fontSize:13,color:"#666"}}>Доступна мана</div>
        <div style={{fontSize:32,fontWeight:700,color:"#c8a840"}}>{g.mana}</div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowExchange(true)} style={{flex:1,background:"rgba(74,184,112,0.1)",border:"1px solid rgba(74,184,112,0.4)",borderRadius:10,padding:"11px 10px",color:"#4ab870",fontSize:13,fontWeight:700,textAlign:"center"}}>
          💸 Мана → гривні<br/><span style={{fontSize:10,opacity:0.7,fontWeight:400}}>1₴ = {MANA_RATE} мани</span>
        </button>
      </div>
      <div style={{background:"rgba(224,85,85,0.07)",border:"1px solid rgba(224,85,85,0.2)",borderRadius:8,padding:"9px 13px",fontSize:11,color:"#e05555"}}>⛔ Не в крамниці: мобільні ігри · безкінечний скрол · Notion без мети</div>
      {[{id:"micro",label:"🥉 Мікро",range:"1250-2000",color:"#4ab870"},{id:"comfort",label:"🥈 Комфорт",range:"3750-7500",color:"#4a8fd4"},{id:"epic",label:"🥇 Епік",range:"20000+",color:"#c8a840"}].map(tier=><div key={tier.id}>
        <div style={{fontSize:10,color:tier.color,fontFamily:"monospace",letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:8}}>{tier.label} · {tier.range} мани</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          {SHOP.filter(i=>i.tier===tier.id).map(item=>{const can=g.mana>=item.cost,flash=shopFlash===item.id;return<button key={item.id} onClick={()=>buy(item)} style={{borderRadius:10,border:"1px solid "+(flash?tier.color:can?"#2a2820":"#181818"),padding:"13px 10px",background:flash?tier.color+"22":"rgba(255,255,255,0.03)",color:"#f0ece4",textAlign:"center",opacity:can?1:0.35,transform:flash?"scale(0.95)":"scale(1)",transition:"all 0.2s",display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontSize:24,marginBottom:5}}>{item.emoji}</div>
            <div style={{fontSize:11,fontWeight:600,marginBottom:6,lineHeight:1.3}}>{item.name}</div>
            <div style={{fontFamily:"monospace",fontSize:13,fontWeight:700,color:can?tier.color:"#444"}}>{item.cost}</div>
          </button>;})}
        </div>
      </div>)}
    </div>}

    {/* ════════════ REVIEW ════════════ */}
    {screen==="review"&&<div style={S.scr} className="fu">
      <div style={S.ttl}>📊 Огляд тижня {cw}</div>
      <div style={S.card}>
        <div style={S.cl}>Скільки квестів виконала?</div>
        <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:16}}>
          {[{label:"Виконано",val:revDone,up:()=>setRevDone(v=>v+1),dn:()=>setRevDone(v=>Math.max(0,v-1)),c:"#4ab870"},{label:"Заплановано",val:revTotal,up:()=>setRevTotal(v=>v+1),dn:()=>setRevTotal(v=>Math.max(1,v-1)),c:"#f0ece4"}].map((fc,i)=><div key={i} style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:10,color:"#555",letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8}}>{fc.label}</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <button onClick={fc.dn} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid #2a2820",color:"#f0ece4",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>-</button>
              <div style={{fontSize:36,fontWeight:700,color:fc.c,minWidth:40,textAlign:"center"}}>{fc.val}</div>
              <button onClick={fc.up} style={{width:32,height:32,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"1px solid #2a2820",color:"#f0ece4",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
            </div>
          </div>)}
        </div>
        <div style={{background:gr.color+"18",border:"1px solid "+gr.color+"44",borderRadius:10,padding:"16px",textAlign:"center"}}>
          <div style={{fontSize:40,fontWeight:700,color:gr.color}}>{pct}%</div>
          <div style={{fontSize:17,fontWeight:700,color:gr.color,marginBottom:4}}>{gr.label}</div>
          <div style={{fontSize:13,color:"#666"}}>{gr.bonus>0?"Бонус +"+gr.bonus+" мани":gr.bonus<0?"Штраф "+gr.bonus+" мани":"Без змін"}</div>
        </div>
      </div>
      <div style={S.card}>
        <div style={S.cl}>Прогрес по проектах</div>
        {PROJECTS.map(p=>{const proj=g.projects[p.id];const wq=proj.weeks[cw-1].quests;const done=wq.filter(q=>q.done).length;return<div key={p.id} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}><span style={{color:p.color,fontWeight:700}}>{p.short} {p.emoji}</span><span style={{color:"#555",fontFamily:"monospace"}}>{done}/{wq.length}</span></div>
          {wq.length>0&&<div style={{height:3,background:"#1a1a1a",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:(wq.length?done/wq.length*100:0)+"%",background:p.color,borderRadius:2,transition:"width 0.4s"}}/></div>}
        </div>;})}
      </div>
      {cw===3&&<div style={{background:"rgba(200,168,64,0.06)",border:"1px solid rgba(200,168,64,0.2)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"#c8a840",lineHeight:1.6}}>
        🏆 Це останній тиждень спринту.<br/>Після закриття спринт збережеться в Історії. Мана залишиться.
      </div>}
      <div style={S.card}>
        <div style={S.cl}>Шкала</div>
        {[{r:"85-100%",l:"🌟 Елітний",b:"+100",c:"#c8a840"},{r:"70-84%",l:"✅ Міцний",b:"+50",c:"#4ab870"},{r:"50-69%",l:"⚡ Виживання",b:"0",c:"#4a8fd4"},{r:"< 50%",l:"🔄 Скидання",b:"-30",c:"#e05555"}].map(x=><div key={x.r} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a1a",fontSize:12}}>
          <span style={{color:"#555"}}>{x.r}</span><span style={{color:x.c}}>{x.l}</span><span style={{fontFamily:"monospace",color:"#c8a840"}}>{x.b}</span>
        </div>)}
      </div>
      <button style={{...S.gold,fontSize:15,padding:"15px"}} onClick={closeWeek}>
        {cw<3?"🏁 Закрити тиждень "+cw+" → Тиждень "+(cw+1):"🏆 Завершити спринт!"}
      </button>
    </div>}

    </div>

    <nav style={{position:"sticky",bottom:0,display:"flex",background:"#101218",borderTop:"1px solid #1e2028",zIndex:100}}>
      {TABS.map(t=><button key={t.id} onClick={()=>setScreen(t.id)}
        style={{flex:1,border:"none",background:"transparent",padding:"10px 1px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,borderTop:screen===t.id?"2px solid #c8a840":"2px solid transparent",color:screen===t.id?"#c8a840":"#444"}}>
        <span style={{fontSize:17}}>{t.e}</span><span style={{fontSize:8}}>{t.l}</span>
      </button>)}
    </nav>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
