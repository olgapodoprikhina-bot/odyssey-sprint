<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Знайди Лева 🦁</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Знайди Лева">
<meta name="theme-color" content="#e8a020">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --savanna:#130e05;--dust:#f5e6c8;
  --amber:#e8a020;--amber-dim:rgba(232,160,32,.18);--flame:#d45a1a;
  --ghost:rgba(245,230,200,.06);--card:rgba(30,21,8,.85);
  --border:rgba(232,160,32,.22);--border-bright:rgba(232,160,32,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--savanna);color:var(--dust);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 90% 50% at 50% 110%,rgba(45,58,26,.5) 0%,transparent 70%),
  radial-gradient(ellipse 60% 30% at 10% 90%,rgba(139,69,19,.12) 0%,transparent 60%);
  pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 8% 12%,rgba(245,230,200,.5) 0%,transparent 100%),
  radial-gradient(1.5px 1.5px at 48% 10%,rgba(245,230,200,.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 85% 16%,rgba(245,230,200,.45) 0%,transparent 100%),
  radial-gradient(1px 1px at 22% 6%,rgba(245,230,200,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 60% 18%,rgba(245,230,200,.35) 0%,transparent 100%);
  pointer-events:none;z-index:0;animation:twinkle 6s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.7}100%{opacity:1}}
#root{position:relative;z-index:1}

.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem;text-align:center}
.onboard-lion{font-size:5rem;animation:breathe 3s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(232,160,32,.6));margin-bottom:1.5rem}
@keyframes breathe{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.1) rotate(2deg)}}
.onboard h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,6vw,3.8rem);font-weight:900;color:var(--amber);line-height:1.1;margin-bottom:.5rem}
.onboard-subtitle{font-size:.95rem;color:rgba(245,230,200,.5);margin-bottom:2.5rem;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.theory-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.9rem;max-width:880px;width:100%;margin-bottom:2.5rem}
.theory-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:18px;padding:1.4rem 1.2rem;text-align:left;backdrop-filter:blur(10px);transition:border-color .2s,transform .2s}
.theory-card:hover{border-color:var(--border-bright);transform:translateY(-2px)}
.theory-card .icon{font-size:1.8rem;margin-bottom:.6rem}
.theory-card h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--amber);margin-bottom:.4rem}
.theory-card p{font-size:.85rem;line-height:1.65;color:rgba(245,230,200,.7)}

.btn-primary{background:linear-gradient(135deg,var(--amber),var(--flame));color:var(--savanna);border:none;border-radius:50px;padding:.9rem 2.5rem;font-size:1.05rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 24px rgba(212,90,26,.45)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,90,26,.55)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--ghost);border:1px solid var(--border);border-radius:10px;color:rgba(245,230,200,.7);padding:.5rem 1rem;font-size:.85rem;font-family:'Nunito',sans-serif;cursor:pointer;transition:background .15s}
.btn-ghost:hover{background:rgba(245,230,200,.1)}
.btn-secondary{background:transparent;border:1px solid var(--border);border-radius:10px;color:rgba(245,230,200,.6);padding:.6rem 1.3rem;font-family:'Nunito',sans-serif;font-weight:600;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:rgba(245,230,200,.06)}
.btn-icon{background:transparent;border:1px solid rgba(212,90,26,.3);border-radius:7px;color:var(--flame);width:30px;height:30px;cursor:pointer;font-size:.88rem;transition:background .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-icon:hover{background:rgba(212,90,26,.15)}
.btn-danger{background:rgba(192,57,43,.85);border:none;border-radius:10px;color:#fff;padding:.6rem 1.4rem;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:background .15s}
.btn-danger:hover{background:#c0392b}

.app{max-width:1020px;margin:0 auto;padding:1.5rem 1.2rem 4rem}
.app-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.app-header h1{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--amber);font-weight:900}
.header-actions{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.stats-bar{display:flex;gap:.7rem;margin-bottom:1.4rem;flex-wrap:wrap}
.stat-chip{background:var(--ghost);border:1px solid var(--border);border-radius:10px;padding:.5rem .9rem;font-size:.8rem;display:flex;align-items:center;gap:.4rem;color:rgba(245,230,200,.65)}
.stat-chip strong{color:var(--amber);font-weight:800;font-size:1rem}
.search-wrap{position:relative;margin-bottom:1rem}
.search-input{width:100%;background:rgba(245,230,200,.05);border:1px solid var(--border);border-radius:12px;color:var(--dust);padding:.7rem 1rem .7rem 2.6rem;font-size:.95rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--amber)}
.search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);font-size:1rem;opacity:.4;pointer-events:none}
.filter-tabs{display:flex;gap:.4rem;margin-bottom:1.4rem;flex-wrap:wrap}
.filter-tab{background:transparent;border:1px solid var(--border);border-radius:8px;color:rgba(245,230,200,.5);padding:.35rem .85rem;font-size:.8rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s}
.filter-tab:hover{border-color:var(--border-bright);color:var(--dust)}
.filter-tab.active{background:var(--amber-dim);border-color:var(--border-bright);color:var(--amber)}
.sort-select{background:rgba(245,230,200,.05);border:1px solid var(--border);border-radius:9px;color:rgba(245,230,200,.65);padding:.38rem .7rem;font-size:.8rem;font-family:'Nunito',sans-serif;outline:none;cursor:pointer}

/* TIP CARD */
.tip-card{background:linear-gradient(135deg,rgba(232,160,32,.07) 0%,rgba(212,90,26,.05) 100%);border:1px solid rgba(232,160,32,.2);border-radius:18px;padding:1.1rem 1.3rem 1rem;margin-bottom:1.3rem;position:relative;overflow:hidden}
.tip-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 100% 50%,rgba(232,160,32,.05),transparent);pointer-events:none}
.tip-card-top{display:flex;align-items:center;gap:.5rem;margin-bottom:.55rem}
.tip-card-label{font-size:.62rem;font-weight:800;color:rgba(232,160,32,.5);text-transform:uppercase;letter-spacing:.1em}
.tip-card-counter{font-size:.6rem;color:rgba(245,230,200,.22);margin-left:auto;font-weight:700}
.tip-card-body{display:flex;align-items:flex-start;gap:.85rem}
.tip-card-emoji{font-size:1.8rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(232,160,32,.3))}
.tip-card-text{font-size:.9rem;line-height:1.6;color:rgba(245,230,200,.82);font-weight:600;flex:1}
.tip-card-text em{font-style:normal;color:var(--amber)}
.tip-card-nav{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;padding-top:.7rem;border-top:1px solid rgba(232,160,32,.08)}
.tip-nav-btn{background:none;border:1px solid rgba(232,160,32,.18);border-radius:8px;color:rgba(232,160,32,.45);cursor:pointer;font-size:.85rem;padding:.25rem .65rem;font-family:'Nunito',sans-serif;transition:all .15s;line-height:1}
.tip-nav-btn:hover{background:rgba(232,160,32,.1);color:var(--amber);border-color:rgba(232,160,32,.4)}
.tip-dots{display:flex;gap:.35rem;align-items:center}
.tip-dot{width:6px;height:6px;border-radius:50%;background:rgba(232,160,32,.18);transition:all .25s;cursor:pointer}
.tip-dot.active{background:rgba(232,160,32,.75);width:18px;border-radius:3px}
.tip-dot:hover{background:rgba(232,160,32,.45)}

/* FORM */
.new-project-card{background:var(--card);border:1px solid var(--border-bright);border-radius:22px;padding:1.8rem;margin-bottom:2rem;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.4);animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.new-project-card h2,.edit-overlay-card h2{font-family:'Playfair Display',serif;color:var(--amber);margin-bottom:1.3rem;font-size:1.25rem}
.form-row{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.form-group{display:flex;flex-direction:column;gap:.35rem;flex:1;min-width:160px}
label{font-size:.75rem;color:rgba(245,230,200,.5);text-transform:uppercase;letter-spacing:.06em;font-weight:800}
input[type="text"],input[type="date"],input[type="number"],input[type="time"],textarea{background:rgba(245,230,200,.05);border:1px solid rgba(232,160,32,.2);border-radius:10px;color:var(--dust);padding:.65rem .95rem;font-size:.95rem;font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;width:100%}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button{opacity:.5}
textarea{resize:vertical;min-height:70px}
input:focus,textarea:focus{border-color:var(--amber)}
input[type="date"],input[type="time"]{color-scheme:dark}
.btn-add-stage{background:transparent;border:1px dashed rgba(232,160,32,.3);border-radius:10px;color:rgba(232,160,32,.55);padding:.5rem 1rem;font-size:.85rem;font-family:'Nunito',sans-serif;cursor:pointer;width:100%;margin-bottom:1rem;transition:all .15s}
.btn-add-stage:hover{border-color:var(--amber);color:var(--amber)}
.form-actions{display:flex;gap:.8rem;justify-content:flex-end;flex-wrap:wrap}
.stages-title{font-size:.75rem;color:rgba(245,230,200,.5);text-transform:uppercase;letter-spacing:.06em;font-weight:800;margin-bottom:.7rem}
.stage-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;flex-wrap:nowrap}

/* TIME INPUTS */
.time-inp{width:66px!important;min-width:0!important;padding:.5rem .4rem!important;text-align:center;font-size:.85rem!important}
.time-col{display:flex;flex-direction:column;gap:1px;align-items:center;flex-shrink:0}
.time-lbl{font-size:.56rem;color:rgba(245,230,200,.3);text-transform:uppercase;letter-spacing:.04em;font-weight:800}
.time-real-lbl{font-size:.6rem;color:rgba(232,160,32,.6);font-weight:800}

/* NEW: Timeline styles for day projects */
.day-project-indicator{background:linear-gradient(135deg,rgba(232,160,32,.1),rgba(212,90,26,.05));border:1px solid rgba(232,160,32,.3);border-radius:12px;padding:.6rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.day-project-indicator span{font-size:.8rem;color:var(--amber);font-weight:700}
.timeline-view{background:rgba(245,230,200,.02);border:1px solid var(--border);border-radius:15px;padding:1.2rem;margin:1rem 0}
.timeline-header{font-size:.9rem;color:var(--amber);font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.timeline-stage{display:flex;align-items:center;gap:1rem;margin-bottom:.8rem;padding:.6rem 0;border-bottom:1px solid rgba(232,160,32,.1);position:relative}
.timeline-stage:last-child{border-bottom:none;margin-bottom:0}
.timeline-time{background:rgba(232,160,32,.15);color:var(--amber);padding:.3rem .7rem;border-radius:8px;font-size:.8rem;font-weight:800;min-width:140px;text-align:center}
.timeline-name{flex:1;font-size:.9rem;color:var(--dust);font-weight:600}
.timeline-status{font-size:1.1rem}

/* TIME VALIDATION */
.time-error{color:#ff6b6b;font-size:.75rem;margin-top:.3rem;font-weight:600}
.stage-time-inputs{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.stage-time-group{display:flex;flex-direction:column;gap:.2rem;align-items:center}
.stage-time-group label{font-size:.65rem;margin-bottom:.1rem}

/* DAY WARNINGS IN FORM */
.day-warnings{margin:.2rem 0 .8rem;display:flex;flex-direction:column;gap:.4rem}
.day-warn{background:rgba(255,193,7,.1);border:1px solid rgba(255,193,7,.3);border-radius:8px;padding:.5rem .8rem;font-size:.75rem;color:#ffdb4d;font-weight:600}
.time-conflict{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);color:#ff6b6b}

/* PROJECT CARDS */
.projects-grid{display:grid;gap:1.3rem;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;backdrop-filter:blur(12px);transition:all .2s;position:relative;overflow:hidden;cursor:pointer}
.project-card:hover{border-color:var(--border-bright);transform:translateY(-2px)}
.project-card.drag-over{border-color:var(--amber);background:rgba(232,160,32,.05)}
.project-card.dragging{opacity:.7;transform:rotate(2deg) scale(.98)}
.project-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:1rem}
.project-title{font-family:'Playfair Display',serif;color:var(--amber);font-size:1.1rem;font-weight:800;line-height:1.3;flex:1}
.project-actions{display:flex;gap:.3rem;flex-shrink:0}
.project-meta{display:flex;gap:.7rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.meta-item{font-size:.75rem;color:rgba(245,230,200,.5);display:flex;align-items:center;gap:.3rem}
.meta-item strong{color:var(--dust)}
.project-stages{margin-bottom:1rem}
.stage-item{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding:.4rem .7rem;background:rgba(245,230,200,.02);border:1px solid rgba(232,160,32,.1);border-radius:8px;transition:all .15s}
.stage-item:hover{background:rgba(245,230,200,.04)}
.stage-item.done{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
.stage-item.overdue{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2)}
.stage-item.warning{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2)}
.stage-name{font-size:.85rem;color:var(--dust);font-weight:600;flex:1}
.stage-date{font-size:.75rem;color:rgba(245,230,200,.6);margin-right:.5rem}
.stage-time{font-size:.7rem;color:var(--amber);font-weight:700;margin-left:.3rem}
.stage-check{cursor:pointer;transition:transform .1s}
.stage-check:hover{transform:scale(1.1)}
.project-progress{display:flex;gap:.6rem;align-items:center;margin-bottom:1rem}
.progress-bar{flex:1;height:6px;background:rgba(245,230,200,.1);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--flame));transition:width .3s}
.progress-text{font-size:.75rem;color:rgba(245,230,200,.6)}
.puzzle-section{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.puzzle-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(20px,1fr));gap:2px;margin-bottom:.6rem;max-width:200px}
.puzzle-piece{width:20px;height:20px;border-radius:3px;cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:.6rem}
.puzzle-piece:hover{transform:scale(1.1)}
.puzzle-piece.placed{background:var(--amber)}
.puzzle-piece.empty{background:rgba(245,230,200,.1);border:1px dashed rgba(232,160,32,.3)}
.puzzle-info{font-size:.75rem;color:rgba(245,230,200,.5);display:flex;justify-content:space-between}
.empty-state{text-align:center;padding:3rem 1.5rem;color:rgba(245,230,200,.4)}
.e-lion{font-size:3rem;margin-bottom:1rem;opacity:.6}
.empty-state p{font-size:.95rem;line-height:1.6}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(4px)}
.modal-content{background:var(--card);border:1px solid var(--border-bright);border-radius:20px;padding:2rem;max-width:90vw;max-height:90vh;overflow-y:auto;width:100%;backdrop-filter:blur(12px);animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem}
.modal-title{font-family:'Playfair Display',serif;color:var(--amber);font-size:1.3rem;font-weight:900}
.close-btn{background:none;border:none;color:rgba(245,230,200,.5);cursor:pointer;font-size:1.5rem;padding:.2rem;transition:color .15s}
.close-btn:hover{color:var(--dust)}

/* TODAY MODAL */
.today-projects{display:flex;flex-direction:column;gap:1rem}
.today-project{background:rgba(245,230,200,.03);border:1px solid var(--border);border-radius:15px;padding:1.2rem}
.today-stages{margin-top:1rem}
.today-stage{display:flex;align-items:center;justify-content:space-between;padding:.5rem .7rem;margin-bottom:.4rem;background:rgba(245,230,200,.02);border-radius:8px}

/* EDIT OVERLAY */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.edit-overlay-card{background:var(--card);border:1px solid var(--border-bright);border-radius:22px;padding:2rem;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;backdrop-filter:blur(15px)}

/* DELETE CONFIRM */
.delete-confirm{background:var(--card);border:1px solid rgba(239,68,68,.3);border-radius:18px;padding:1.8rem;max-width:400px;text-align:center}
.delete-confirm h3{color:#ff6b6b;margin-bottom:1rem;font-family:'Playfair Display',serif}
.delete-confirm p{margin-bottom:1.5rem;color:rgba(245,230,200,.7);line-height:1.5}
.delete-actions{display:flex;gap:.8rem;justify-content:center}

/* IMAGE BANK */
.bank-modal{max-width:800px}
.bank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:1rem;margin-bottom:1.5rem}
.bank-image{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .15s}
.bank-image:hover{transform:scale(1.05)}
.bank-image img{width:100%;height:100%;object-fit:cover}
.bank-image-actions{position:absolute;top:.3rem;right:.3rem;display:flex;gap:.2rem}
.bank-image.selected{border:3px solid var(--amber);transform:scale(1.05)}
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;margin-bottom:1.5rem;cursor:pointer;transition:border-color .15s}
.upload-area:hover{border-color:var(--border-bright)}
.upload-area input[type="file"]{display:none}

/* ARCHIVE MODAL */
.archive-controls{display:flex;gap:.8rem;margin-bottom:1.5rem;flex-wrap:wrap}
.archive-projects{display:flex;flex-direction:column;gap:1rem}
.archive-project{background:rgba(245,230,200,.02);border:1px solid rgba(232,160,32,.1);border-radius:15px;padding:1.2rem;opacity:.7}
.archive-meta{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;flex-wrap:wrap;gap:.5rem}
.archive-date{font-size:.75rem;color:rgba(245,230,200,.4)}
.archive-actions{display:flex;gap:.5rem}

/* CSV EXPORT MODAL */
.csv-modal{max-width:500px}
.csv-form{display:flex;flex-direction:column;gap:1rem}
.csv-option{display:flex;align-items:center;gap:.8rem;padding:.8rem;background:rgba(245,230,200,.02);border:1px solid var(--border);border-radius:10px}
.csv-option input[type="checkbox"]{margin:0}
.csv-option label{margin:0;font-size:.9rem;color:var(--dust);cursor:pointer;flex:1}
.csv-priority{background:rgba(245,230,200,.05);border:1px solid rgba(232,160,32,.2);border-radius:8px;padding:.5rem .7rem;font-size:.85rem;color:var(--dust)}

/* MINI CALENDAR */
.mini-cal{background:rgba(245,230,200,.02);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:1rem}
.mini-cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem}
.mini-cal-title{font-size:.9rem;color:var(--amber);font-weight:800}
.mini-cal-nav{background:none;border:none;color:rgba(232,160,32,.6);cursor:pointer;padding:.2rem .4rem;border-radius:4px;transition:background .15s}
.mini-cal-nav:hover{background:rgba(232,160,32,.1);color:var(--amber)}

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

// Storage functions remain the same
const saveData=(key,data)=>{
  try{localStorage.setItem(key,JSON.stringify(data))}catch(e){console.error('Save error:',e)}
};
const loadData=(key,fallback=[])=>{
  try{const d=localStorage.getItem(key);return d?JSON.parse(d):fallback}catch(e){console.error('Load error:',e);return fallback}
};

// NEW: Time validation functions
const parseTime = (timeStr) => {
  if (!timeStr) return null;
  const [hours, minutes] = timeStr.split(':').map(Number);
  return hours * 60 + minutes; // minutes from midnight
};

const formatTime = (minutes) => {
  if (minutes === null || minutes === undefined) return '';
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
};

const validateStageTime = (stages, editingIndex = -1) => {
  const conflicts = [];
  const sortedStages = stages
    .map((stage, index) => ({ ...stage, originalIndex: index }))
    .filter(stage => stage.startTime && stage.endTime && stage.originalIndex !== editingIndex)
    .sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));

  for (let i = 0; i < sortedStages.length; i++) {
    const current = sortedStages[i];
    const currentStart = parseTime(current.startTime);
    const currentEnd = parseTime(current.endTime);
    
    if (currentStart >= currentEnd) {
      conflicts.push({
        index: current.originalIndex,
        message: 'Початок має бути раніше за кінець'
      });
    }
    
    for (let j = i + 1; j < sortedStages.length; j++) {
      const next = sortedStages[j];
      const nextStart = parseTime(next.startTime);
      const nextEnd = parseTime(next.endTime);
      
      if (currentEnd > nextStart) {
        conflicts.push({
          index: current.originalIndex,
          message: `Перетинається з "${next.name}"`
        });
        conflicts.push({
          index: next.originalIndex,
          message: `Перетинається з "${current.name}"`
        });
      }
    }
  }
  
  return conflicts;
};

// NEW: Check if project is a "day project"
const isDayProject = (stages) => {
  if (stages.length < 2) return false;
  const dates = stages.map(s => s.date).filter(Boolean);
  if (dates.length === 0) return false;
  const uniqueDates = [...new Set(dates)];
  return uniqueDates.length === 1 && stages.some(s => s.startTime && s.endTime);
};

const TIPS=[
  '🎯 Розбий велику задачу на маленькі кроки — мозок любить конкретність.',
  '⏰ Поставь таймер на 15 хвилин і просто почни. Не думай про результат.',
  '🎵 Включи улюблену музику — допоміжний звук може активувати фокус.',
  '📝 Запиши ВСЕ в голові на папір. Звільни оперативку для важливого.',
  '🍅 Спробуй техніку Pomodoro: 25 хвилин роботи, 5 хвилин перерви.',
  '💡 Використовуй *інтерес* як паливо — почни з найцікавішої частини.',
  '🚀 Не шукай ідеальне рішення. Зроби *щось*, потім покращ.',
  '🎮 Геймифікуй процес: +100 XP за кожен завершений етап.',
  '🧠 Твій мозок не зламаний — він просто працює по-іншому.',
  '⚡ Використай гіперфокус: коли "зайшло" — їдь на хвилі.',
  '📱 Вимкни сповіщення на час роботи. Цифровий детокс творить дива.',
  '☕ Знай свої години пік — плануй складне на час максимальної енергії.',
  '🎨 Візуалізуй результат: як виглядатиме готовий костюм?',
  '🤝 Розкажи комусь про план — зовнішня звітність мотивує.',
  '🎪 Зміни обстановку: інша кімната = новий настрій для роботи.'
];

const ProjectForm=({onSave,onCancel,allProjects,project=null})=>{
  const [name,setName]=useState(project?.name||'');
  const [description,setDescription]=useState(project?.description||'');
  const [stages,setStages]=useState(project?.stages||[{name:'',date:'',startTime:'',endTime:'',done:false}]);
  const [puzzleSize,setPuzzleSize]=useState(project?.puzzleSize||12);
  const [showTimeConflicts, setShowTimeConflicts] = useState(false);
  
  // NEW: Auto-detect day project and show info
  const isDay = isDayProject(stages);
  const timeConflicts = useMemo(() => validateStageTime(stages), [stages]);
  
  useEffect(() => {
    setShowTimeConflicts(timeConflicts.length > 0);
  }, [timeConflicts]);

  const addStage=()=>{
    setStages(prev=>[...prev,{name:'',date:'',startTime:'',endTime:'',done:false}]);
  };
  
  const updateStage=(i,field,value)=>{
    setStages(prev=>prev.map((s,idx)=>idx===i?{...s,[field]:value}:s));
  };
  
  const removeStage=(i)=>{
    setStages(prev=>prev.filter((_,idx)=>idx!==i));
  };

  const handleSave=()=>{
    if(!name.trim()){alert('Введи назву проекту');return}
    const validStages=stages.filter(s=>s.name.trim());
    if(!validStages.length){alert('Додай хоча б один етап');return}
    
    // Check for time conflicts before saving
    if (timeConflicts.length > 0) {
      alert('Виправ конфлікти часу перед збереженням');
      return;
    }
    
    const newProject={
      id:project?.id||Date.now(),
      name:name.trim(),
      description:description.trim(),
      stages:validStages.map(s=>({
        ...s,
        name:s.name.trim(),
        startTime: s.startTime || '',
        endTime: s.endTime || ''
      })),
      puzzleSize,
      puzzlePlaced:project?.puzzlePlaced||0,
      imageId:project?.imageId||null,
      createdAt:project?.createdAt||Date.now()
    };
    onSave(newProject);
  };

  return(
    <div className="new-project-card">
      <h2>{project?'Редагувати проект':'Новий проект'}</h2>
      
      <div className="form-row">
        <div className="form-group">
          <label>Назва проекту</label>
          <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Сукня для Анни"/>
        </div>
      </div>
      
      <div className="form-row">
        <div className="form-group">
          <label>Опис</label>
          <textarea value={description} onChange={e=>setDescription(e.target.value)} placeholder="Деталі проекту..."/>
        </div>
        <div className="form-group">
          <label>Пазл ({puzzleSize} шт.)</label>
          <input type="number" value={puzzleSize} onChange={e=>setPuzzleSize(Math.max(1,+e.target.value))} min="1" max="50"/>
        </div>
      </div>

      {/* NEW: Day project indicator */}
      {isDay && (
        <div className="day-project-indicator">
          <span>⏰ Проект одного дня</span>
          <span>— етапи з часом будуть показані як timeline</span>
        </div>
      )}

      <div className="stages-title">Етапи проекту</div>
      
      {/* NEW: Time conflicts warning */}
      {showTimeConflicts && (
        <div className="day-warnings">
          {timeConflicts.map((conflict, idx) => (
            <div key={idx} className="day-warn time-conflict">
              Етап #{conflict.index + 1}: {conflict.message}
            </div>
          ))}
        </div>
      )}
      
      {stages.map((stage,i)=>(
        <div key={i} className="stage-row">
          <input 
            type="text" 
            value={stage.name} 
            onChange={e=>updateStage(i,'name',e.target.value)} 
            placeholder="Назва етапу"
            style={{flex:1,minWidth:'140px'}}
          />
          <input 
            type="date" 
            value={stage.date} 
            onChange={e=>updateStage(i,'date',e.target.value)}
            style={{width:'140px'}}
          />
          
          {/* NEW: Time inputs */}
          <div className="stage-time-inputs">
            <div className="stage-time-group">
              <label>Початок</label>
              <input 
                type="time" 
                value={stage.startTime || ''} 
                onChange={e=>updateStage(i,'startTime',e.target.value)}
                className="time-inp"
              />
            </div>
            <div className="stage-time-group">
              <label>Кінець</label>
              <input 
                type="time" 
                value={stage.endTime || ''} 
                onChange={e=>updateStage(i,'endTime',e.target.value)}
                className="time-inp"
              />
            </div>
          </div>

          <button className="btn-icon" onClick={()=>removeStage(i)}>×</button>
        </div>
      ))}
      
      <button className="btn-add-stage" onClick={addStage}>+ Додати етап</button>
      
      <div className="form-actions">
        <button className="btn-secondary" onClick={onCancel}>Скасувати</button>
        <button className="btn-primary" onClick={handleSave}>
          {project?'Зберегти зміни':'Створити проект'}
        </button>
      </div>
    </div>
  );
};

// NEW: Timeline component for day projects
const TimelineView = ({ stages, onToggle }) => {
  const sortedStages = stages
    .filter(s => s.startTime && s.endTime)
    .sort((a, b) => parseTime(a.startTime) - parseTime(b.startTime));

  if (sortedStages.length === 0) return null;

  return (
    <div className="timeline-view">
      <div className="timeline-header">
        ⏱️ Timeline дня
      </div>
      {sortedStages.map((stage, idx) => (
        <div key={idx} className="timeline-stage">
          <div className="timeline-time">
            {stage.startTime} - {stage.endTime}
          </div>
          <div className="timeline-name">{stage.name}</div>
          <div 
            className="timeline-status"
            onClick={() => onToggle(stage)}
            style={{ cursor: 'pointer' }}
          >
            {stage.done ? '✅' : '⏳'}
          </div>
        </div>
      ))}
    </div>
  );
};

const ProjectCard=({project,onToggle,onDelete,onArchive,onEdit,onProjDragStart,onProjDragOver,onProjDragEnd,isDragging,isDragOver,onNewImage,onPickImage,onPuzzlePlace,customImage,allProjects,togglProjData})=>{
  const doneStages=project.stages.filter(s=>s.done).length;
  const totalStages=project.stages.length;
  const progress=totalStages>0?(doneStages/totalStages)*100:0;
  
  const today=new Date().toISOString().split('T')[0];
  const upcoming=project.stages.filter(s=>s.date&&!s.done);
  const overdue=upcoming.filter(s=>s.date<today);
  const nextStage=upcoming.sort((a,b)=>a.date.localeCompare(b.date))[0];
  
  const isDone=doneStages===totalStages&&totalStages>0;
  const isOverdue=overdue.length>0;
  const hasWarnings=nextStage&&nextStage.date<=today&&!isDone;
  
  // NEW: Check if this is a day project
  const isDay = isDayProject(project.stages);

  const handleDragStart=(e)=>{
    onProjDragStart(e,project.id);
  };

  const handleDragOver=(e)=>{
    e.preventDefault();
    onProjDragOver(project.id);
  };

  const handleDragEnd=()=>{
    onProjDragEnd();
  };

  return(
    <div 
      className={`project-card${isDragging?' dragging':''}${isDragOver?' drag-over':''}`}
      draggable 
      onDragStart={handleDragStart} 
      onDragOver={handleDragOver} 
      onDragEnd={handleDragEnd}
    >
      <div className="project-card-header">
        <div className="project-title">{project.name}</div>
        <div className="project-actions">
          <button className="btn-icon" onClick={()=>onEdit(project)} title="Редагувати">✏️</button>
          <button className="btn-icon" onClick={()=>onArchive(project.id)} title="В архів">📦</button>
          <button className="btn-icon" onClick={()=>onDelete(project.id)} title="Видалити">🗑</button>
        </div>
      </div>

      <div className="project-meta">
        <div className="meta-item">📅 Етапів: <strong>{doneStages}/{totalStages}</strong></div>
        {nextStage&&<div className="meta-item">🎯 Наступний: <strong>{nextStage.date}</strong></div>}
        {togglProjData&&<div className="meta-item">⏱ Час: <strong>{(togglProjData.totalTime/3600).toFixed(1)}г</strong></div>}
      </div>

      <div className="project-progress">
        <div className="progress-bar">
          <div className="progress-fill" style={{width:`${progress}%`}}/>
        </div>
        <div className="progress-text">{Math.round(progress)}%</div>
      </div>

      {/* NEW: Show timeline for day projects, regular stages for others */}
      {isDay ? (
        <TimelineView stages={project.stages} onToggle={(stage) => onToggle(project.id, stage)} />
      ) : (
        <div className="project-stages">
          {project.stages.map((stage,i)=>{
            const stageOverdue=stage.date&&stage.date<today&&!stage.done;
            const stageWarning=stage.date&&stage.date===today&&!stage.done;
            return(
              <div key={i} className={`stage-item${stage.done?' done':''}${stageOverdue?' overdue':''}${stageWarning?' warning':''}`}>
                <div className="stage-name">
                  {stage.name}
                  {stage.startTime && stage.endTime && (
                    <span className="stage-time">
                      {stage.startTime}-{stage.endTime}
                    </span>
                  )}
                </div>
                <div className="stage-date">{stage.date}</div>
                <div className="stage-check" onClick={()=>onToggle(project.id,stage)}>
                  {stage.done?'✅':'⚪'}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="puzzle-section">
        <div className="puzzle-grid">
          {Array.from({length:project.puzzleSize},(_, i)=>(
            <div 
              key={i} 
              className={`puzzle-piece ${i<project.puzzlePlaced?'placed':'empty'}`}
              onClick={()=>i>=project.puzzlePlaced&&onPuzzlePlace(project.id)}
            >
              {i<project.puzzlePlaced?'🧩':''}
            </div>
          ))}
        </div>
        <div className="puzzle-info">
          <span>{project.puzzlePlaced}/{project.puzzleSize}</span>
          <div>
            <button className="btn-icon" onClick={()=>onPickImage(project.id)} title="Обрати зображення">🖼</button>
            <button className="btn-icon" onClick={()=>onNewImage(project.id)} title="Додати зображення">📷</button>
          </div>
        </div>
        {customImage&&<img src={customImage} alt="Project" style={{width:'100%',maxHeight:'120px',objectFit:'cover',borderRadius:'8px',marginTop:'.5rem'}}/>}
      </div>
    </div>
  );
};

// Rest of the components remain the same...
const TodayModal=({projects,onClose,onToggle})=>{
  const today=new Date().toISOString().split('T')[0];
  const todayProjects=projects.filter(p=>p.stages.some(s=>s.date===today&&!s.done));

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Сьогодні ({today})</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        {!todayProjects.length?(
          <p>Немає завдань на сьогодні 🦁</p>
        ):(
          <div className="today-projects">
            {todayProjects.map(p=>(
              <div key={p.id} className="today-project">
                <h3 style={{color:'var(--amber)',marginBottom:'.5rem'}}>{p.name}</h3>
                <div className="today-stages">
                  {p.stages.filter(s=>s.date===today&&!s.done).map((stage,i)=>(
                    <div key={i} className="today-stage">
                      <span>{stage.name}</span>
                      <button className="btn-ghost" onClick={()=>onToggle(p.id,stage)}>Завершити</button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

const EditOverlay=({project,onSave,onCancel,allProjects})=>{
  return(
    <div className="edit-overlay" onClick={onCancel}>
      <div className="edit-overlay-card" onClick={e=>e.stopPropagation()}>
        <ProjectForm 
          project={project} 
          onSave={(edited)=>{onSave(edited);onCancel();}} 
          onCancel={onCancel} 
          allProjects={allProjects}
        />
      </div>
    </div>
  );
};

const DeleteConfirm=({name,onConfirm,onCancel})=>(
  <div className="modal-overlay" onClick={onCancel}>
    <div className="delete-confirm" onClick={e=>e.stopPropagation()}>
      <h3>Видалити проект?</h3>
      <p>Проект "<strong>{name}</strong>" буде видалено назавжди.</p>
      <div className="delete-actions">
        <button className="btn-secondary" onClick={onCancel}>Скасувати</button>
        <button className="btn-danger" onClick={onConfirm}>Видалити</button>
      </div>
    </div>
  </div>
);

const ImageBankModal=({bankImages,onClose,onAddImage,onDeleteImage,pickMode,currentImageId,onPick})=>{
  const [dragOver,setDragOver]=useState(false);

  const handleDrop=(e)=>{
    e.preventDefault();
    setDragOver(false);
    const files=Array.from(e.dataTransfer.files);
    files.forEach(f=>{if(f.type.startsWith('image/'))onAddImage(f)});
  };

  const handleFileInput=(e)=>{
    const files=Array.from(e.target.files);
    files.forEach(f=>onAddImage(f));
    e.target.value='';
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content bank-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{pickMode?'Обери зображення':'Банк зображень'}</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        {!pickMode&&(
          <div 
            className={`upload-area${dragOver?' drag-over':''}`}
            onDragOver={e=>{e.preventDefault();setDragOver(true)}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={handleDrop}
            onClick={()=>document.getElementById('file-input').click()}
          >
            <input type="file" id="file-input" accept="image/*" multiple onChange={handleFileInput}/>
            <p>Перетягни зображення або клікни для вибору</p>
          </div>
        )}

        <div className="bank-grid">
          {bankImages.map(img=>(
            <div 
              key={img.id} 
              className={`bank-image${pickMode&&currentImageId===img.id?' selected':''}`}
              onClick={()=>pickMode?onPick(img.id):null}
            >
              <img src={img.data} alt={img.name}/>
              {!pickMode&&(
                <div className="bank-image-actions">
                  <button className="btn-icon" onClick={()=>onDeleteImage(img.id)}>🗑</button>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const ArchiveModal=({archive,projects,bankImages,onClose,onRestore,onDeletePermanently,onExport})=>{
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Архів проектів</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>
        
        <div className="archive-controls">
          <button className="btn-secondary" onClick={onExport}>📦 Експорт backup</button>
        </div>

        {!archive.length?(
          <p>Архів порожній 📦</p>
        ):(
          <div className="archive-projects">
            {archive.map(p=>(
              <div key={p.id} className="archive-project">
                <h3 style={{color:'var(--amber)',marginBottom:'.5rem'}}>{p.name}</h3>
                <p style={{fontSize:'.85rem',color:'rgba(245,230,200,.6)',marginBottom:'.5rem'}}>{p.description}</p>
                <div className="archive-meta">
                  <span className="archive-date">Архівовано: {new Date(p.archivedAt).toLocaleDateString()}</span>
                  <div className="archive-actions">
                    <button className="btn-ghost" onClick={()=>onRestore(p.id)}>↩ Відновити</button>
                    <button className="btn-danger" onClick={()=>onDeletePermanently(p.id)}>🗑 Видалити</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

const TogglModal=({projects,togglData,onClose,onSynced})=>{
  const [loading,setLoading]=useState(false);

  const handleSync=async()=>{
    setLoading(true);
    // Mock Toggl sync
    await new Promise(resolve=>setTimeout(resolve,1500));
    const mockData={
      totalTime:12345,
      projects:projects.reduce((acc,p)=>({...acc,[p.id]:{totalTime:Math.random()*7200,entries:[]}}),{})
    };
    onSynced(mockData);
    setLoading(false);
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">Toggl інтеграція</div>
          <button className="close-btn" onClick={onClose}>×</button>
        </div>

        <div className="toggl-stats">
          <div className="toggl-stat">
            <div className="toggl-stat-value">{(togglData.totalTime/3600).toFixed(1)}г</div>
            <div className="toggl-stat-label">Загальний час</div>
          </div>
        </div>

        <button className="btn-primary" onClick={handleSync} disabled={loading} style={{width:'100%',marginBottom:'1rem'}}>
          {loading?'⏳ Синхронізація...':'🔄 Синхронізувати з Toggl'}
        </button>

        {togglData.projects&&(
          <div className="toggl-projects">
            <h4 style={{marginBottom:'1rem',color:'var(--amber)'}}>Проекти</h4>
            {projects.map(p=>{
              const data=togglData.projects[p.id];
              return data?(
                <div key={p.id} className="toggl-project">
                  <div className="toggl-project-header">
                    <span className="toggl-project-name">{p.name}</span>
                    <span className="toggl-project-time">{(data.totalTime/3600).toFixed(1)}г</span>
                  </div>
                </div>
              ):null;
            })}
          </div>
        )}
      </div>
    </div>
  );
};

const MiniCalendar=({projects})=>{
  const [currentDate,setCurrentDate]=useState(new Date());
  const today=new Date();

  const year=currentDate.getFullYear();
  const month=currentDate.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDate=new Date(firstDay);
  startDate.setDate(startDate.getDate()-firstDay.getDay());
  const endDate=new Date(lastDay);
  endDate.setDate(endDate.getDate()+(6-lastDay.getDay()));

  const monthNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

  const milestones=new Set();
  projects.forEach(p=>{
    p.stages.forEach(s=>{
      if(s.date)milestones.add(s.date);
    });
  });

  const getDaysArray=()=>{
    const days=[];
    const current=new Date(startDate);
    while(current<=endDate){
      days.push(new Date(current));
      current.setDate(current.getDate()+1);
    }
    return days;
  };

  const prevMonth=()=>setCurrentDate(new Date(year,month-1,1));
  const nextMonth=()=>setCurrentDate(new Date(year,month+1,1));

  return(
    <div className="mini-cal">
      <div className="mini-cal-header">
        <button className="mini-cal-nav" onClick={prevMonth}>‹</button>
        <div className="mini-cal-title">{monthNames[month]} {year}</div>
        <button className="mini-cal-nav" onClick={nextMonth}>›</button>
      </div>
      <div className="mini-cal-grid">
        {getDaysArray().map((date,i)=>{
          const dateStr=date.toISOString().split('T')[0];
          const isToday=date.toDateString()===today.toDateString();
          const hasMilestone=milestones.has(dateStr);
          const isCurrentMonth=date.getMonth()===month;
          return(
            <div 
              key={i} 
              className={`mini-cal-day${isToday?' today':''}${hasMilestone?' has-milestone':''}${!isCurrentMonth?' other-month':''}`}
            >
              {date.getDate()}
            </div>
          );
        })}
      </div>
    </div>
  );
};

const exportBackup=(projects,archive)=>{
  const backup={
    version:'2.0',
    exportDate:new Date().toISOString(),
    projects,
    archive
  };
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`znaydy-leva-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

    <div className="onboard">
      <div className="onboard-lion">🦁</div>
      <h1>Знайди Лева</h1>

      <div className="theory-cards">

function App(){
  const [projects,setProjects]=useState([]);
  const [archive,setArchive]=useState([]);
  const [bankImages,setBankImages]=useState([]);
  const [bankLoaded,setBankLoaded]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [showToday,setShowToday]=useState(false);
  const [showToggl,setShowToggl]=useState(false);
  const [showBank,setShowBank]=useState(false);
  const [showArchive,setShowArchive]=useState(false);
  const [deleteId,setDeleteId]=useState(null);
  const [editProject,setEditProject]=useState(null);
  const [pickProjectId,setPickProjectId]=useState(null);
  const [search,setSearch]=useState('');
  const [filter,setFilter]=useState('all');
  const [tipIdx,setTipIdx]=useState(0);
  const [togglData,setTogglData]=useState({totalTime:0,projects:{}});
  const [dragProjId,setDragProjId]=useState(useRef(null));
  const [dragOverId,setDragOverId]=useState(null);

  const dragProjIdRef=useRef(null);

  useEffect(()=>{
    const p=loadData('znaydy-leva-projects',[]);
    const a=loadData('znaydy-leva-archive',[]);
    setProjects(p);
    setArchive(a);
    if(!p.length&&!a.length)setShowOnboarding(true);
    
    const idx=loadData('znaydy-leva-tip-index',0);
    setTipIdx(idx%TIPS.length);
  },[]);

  useEffect(()=>{
    saveData('znaydy-leva-projects',projects);
  },[projects]);

  useEffect(()=>{
    saveData('znaydy-leva-archive',archive);
  },[archive]);

  useEffect(()=>{
    saveData('znaydy-leva-tip-index',tipIdx);
  },[tipIdx]);

  useEffect(()=>{
    const interval=setInterval(()=>{
      setTipIdx(i=>(i+1)%TIPS.length);
    },45000);
    return()=>clearInterval(interval);
  },[]);

  useEffect(()=>{
    const loadBank=async()=>{
      try{
        const db=await new Promise((resolve,reject)=>{
          const req=indexedDB.open('ZnaydyLevaImageBank',1);
          req.onerror=()=>reject(req.error);
          req.onsuccess=()=>resolve(req.result);
          req.onupgradeneeded=e=>{
            const db=e.target.result;
            if(!db.objectStoreNames.contains('images')){
              db.createObjectStore('images',{keyPath:'id'});
            }
          };
        });
        const tx=db.transaction(['images'],'readonly');
        const store=tx.objectStore('images');
        const req=store.getAll();
        req.onsuccess=()=>{setBankImages(req.result);setBankLoaded(true);};
      }catch(e){console.error('Bank load error:',e);setBankLoaded(true);}
    };
    loadBank();
  },[]);

  const handleSave=(project)=>{
    setProjects(prev=>{
      const exists=prev.findIndex(p=>p.id===project.id);
      return exists>=0?prev.map((p,i)=>i===exists?project:p):[...prev,project];
    });
    setShowForm(false);
  };

  const handleToggle=(projId,stage)=>{
    setProjects(prev=>prev.map(p=>p.id===projId?{...p,stages:p.stages.map(s=>s===stage?{...s,done:!s.done}:s)}:p));
  };

  const handleArchive=(projId)=>{
    const proj=projects.find(p=>p.id===projId);
    if(!proj)return;
    setArchive(prev=>[...prev,{...proj,archivedAt:Date.now()}]);
    setProjects(prev=>prev.filter(p=>p.id!==projId));
  };

  const handleRestore=(projId)=>{
    const proj=archive.find(p=>p.id===projId);
    if(!proj)return;
    const{archivedAt,...restored}=proj;
    setProjects(prev=>[...prev,restored]);
    setArchive(prev=>prev.filter(p=>p.id!==projId));
  };

  const handleArchiveDelete=(projId)=>{
    if(!confirm('Видалити проект назавжди?'))return;
    setArchive(prev=>prev.filter(p=>p.id!==projId));
  };

  const confirmDelete=()=>{
    setProjects(prev=>prev.filter(p=>p.id!==deleteId));
    setDeleteId(null);
  };

  const handlePuzzlePlace=(projId)=>{
    setProjects(prev=>prev.map(p=>p.id===projId?{...p,puzzlePlaced:Math.min(p.puzzlePlaced+1,p.puzzleSize)}:p));
  };

  const handleNewImage=(projId)=>{
    setPickProjectId(projId);
    const input=document.createElement('input');
    input.type='file';
    input.accept='image/*';
    input.onchange=async e=>{
      const file=e.target.files[0];
      if(!file)return;
      await handleAddBankImage(file);
      setShowBank(true);
    };
    input.click();
  };

  const openPickMode=(projId)=>{
    setPickProjectId(projId);
    setShowBank(true);
  };

  const handlePickImage=(imageId)=>{
    if(!pickProjectId)return;
    setProjects(prev=>prev.map(p=>p.id===pickProjectId?{...p,imageId}:p));
    setShowBank(false);
    setPickProjectId(null);
  };

  const handleAddBankImage=async(file)=>{
    try{
      const reader=new FileReader();
      reader.onload=async e=>{
        const img={id:Date.now(),name:file.name,data:e.target.result};
        setBankImages(prev=>[...prev,img]);
        const db=await new Promise((resolve,reject)=>{
          const req=indexedDB.open('ZnaydyLevaImageBank',1);
          req.onerror=()=>reject(req.error);
          req.onsuccess=()=>resolve(req.result);
        });
        const tx=db.transaction(['images'],'readwrite');
        const store=tx.objectStore('images');
        store.add(img);
      };
      reader.readAsDataURL(file);
    }catch(e){console.error('Image add error:',e);}
  };

  const handleDeleteBankImage=async(imageId)=>{
    try{
      setBankImages(prev=>prev.filter(i=>i.id!==imageId));
      setProjects(prev=>prev.map(p=>p.imageId===imageId?{...p,imageId:null}:p));
      const db=await new Promise((resolve,reject)=>{
        const req=indexedDB.open('ZnaydyLevaImageBank',1);
        req.onerror=()=>reject(req.error);
        req.onsuccess=()=>resolve(req.result);
      });
      const tx=db.transaction(['images'],'readwrite');
      const store=tx.objectStore('images');
      store.delete(imageId);
    }catch(e){console.error('Image delete error:',e);}
  };

  const onProjDragStart=(e,projId)=>{
    dragProjIdRef.current=projId;
  };

  const onProjDragOver=(targetId)=>{
    setDragOverId(targetId);
  };

  const onProjDragEnd=()=>{
    if(dragProjIdRef.current&&dragOverId&&dragProjIdRef.current!==dragOverId){
      setProjects(prev=>{
        const dragIndex=prev.findIndex(p=>p.id===dragProjIdRef.current);
        const dropIndex=prev.findIndex(p=>p.id===dragOverId);
        if(dragIndex>=0&&dropIndex>=0){
          const newProjects=[...prev];
          const draggedProject=newProjects.splice(dragIndex,1)[0];
          newProjects.splice(dropIndex,0,draggedProject);
          return newProjects;
        }
        return prev;
      });
    }
    dragProjIdRef.current=null;
    setDragOverId(null);
  };

  const ptd=projects.find(p=>p.id===deleteId);

  const filtered=useMemo(()=>{
    let result=projects;
    if(search){
      const s=search.toLowerCase();
      result=result.filter(p=>
        p.name.toLowerCase().includes(s)||
        p.description.toLowerCase().includes(s)||
        p.stages.some(stage=>stage.name.toLowerCase().includes(s))
      );
    }
    const today=new Date().toISOString().split('T')[0];
    if(filter==='active')result=result.filter(p=>p.stages.some(s=>!s.done));
    else if(filter==='done')result=result.filter(p=>p.stages.every(s=>s.done)&&p.stages.length>0);
    else if(filter==='danger')result=result.filter(p=>p.stages.some(s=>s.date<today&&!s.done));
    return result;
  },[projects,search,filter]);

  const stats=useMemo(()=>{
    const totalP=projects.length;
    const doneP=projects.filter(p=>p.stages.every(s=>s.done)&&p.stages.length>0).length;
    const totalS=projects.reduce((sum,p)=>sum+p.stages.length,0);
    const doneS=projects.reduce((sum,p)=>sum+p.stages.filter(s=>s.done).length,0);
    const totalL=projects.reduce((sum,p)=>sum+p.puzzleSize,0);
    const doneL=projects.reduce((sum,p)=>sum+p.puzzlePlaced,0);
    return{totalP,doneP,totalS,doneS,totalL,doneL};
  },[projects]);

  if(showOnboarding)return<OnboardingScreen onComplete={()=>setShowOnboarding(false)}/>;

  const{totalP,doneP,totalS,doneS,totalL,doneL}=stats;
  const disp=filtered;

  return(
  <div className="app">
    <div className="app-header">
      <h1>🦁 Знайди Лева</h1>
      <div className="header-actions">
        <button className="btn-ghost" onClick={()=>setShowToday(true)}>📅 Сьогодні</button>
        <button className="btn-ghost" onClick={()=>setShowToggl(true)}>⏱ Toggl</button>
        <button className="btn-ghost" onClick={()=>{setPickProjectId(null);setShowBank(true);}}>🖼 Банк</button>
      </div>
    </div>

    <MiniCalendar projects={projects}/>

    {projects.length>0&&(
      <div className="stats-bar">
        <div className="stat-chip">📁 Проектів: <strong>{doneP}/{totalP}</strong></div>
        {totalS>0&&<div className="stat-chip">📋 Етапів: <strong>{doneS}/{totalS}</strong></div>}
        {totalL>0&&<div className="stat-chip">🧩 Фрагментів: <strong>{doneL}/{totalL}</strong></div>}
        {archive.length>0&&<div className="stat-chip" style={{cursor:'pointer'}} onClick={()=>setShowArchive(true)}>📦 В архіві: <strong>{archive.length}</strong></div>}
      </div>
    )}

    {(()=>{
      const raw=TIPS[tipIdx];
      const emojiMatch=raw.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)/u);
      const emoji=emojiMatch?emojiMatch[0]:'💡';
      const text=emojiMatch?raw.slice(emoji.length).trim():raw;
      return(
        <div className="tip-card">
          <div className="tip-card-top">
            <span className="tip-card-label">💡 Порада для СДВГ-мозку</span>
            <span className="tip-card-counter">{tipIdx+1}/{TIPS.length}</span>
          </div>
          <div className="tip-card-body">
            <span className="tip-card-emoji">{emoji}</span>
            <span className="tip-card-text">{text}</span>
          </div>
          <div className="tip-card-nav">
            <button className="tip-nav-btn" onClick={()=>setTipIdx(i=>(i-1+TIPS.length)%TIPS.length)}>‹ Назад</button>
            <div className="tip-dots">
              {TIPS.map((_,i)=>(
                <div key={i} className={`tip-dot${i===tipIdx?' active':''}`} onClick={()=>setTipIdx(i)}/>
              ))}
            </div>
            <button className="tip-nav-btn" onClick={()=>setTipIdx(i=>(i+1)%TIPS.length)}>Далі ›</button>
          </div>
        </div>
      );
    })()}

    {!showForm&&(
      <button className="btn-primary" onClick={()=>setShowForm(true)}
        style={{width:'100%',marginBottom:'1.2rem',borderRadius:14,fontSize:'1rem'}}>
        + Новий проект
      </button>
    )}
    {showForm&&<ProjectForm onSave={handleSave} onCancel={()=>setShowForm(false)} allProjects={projects}/>}

    {projects.length>0&&(<>
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="search-input" placeholder="Пошук проектів та етапів..."
          value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>
      <div className="filter-tabs">
        {[['all','Всі'],['active','Активні'],['danger','🔥 Горять'],['done','✅ Готові']].map(([k,l])=>(
          <button key={k} className={`filter-tab${filter===k?' active':''}`} onClick={()=>setFilter(k)}>{l}</button>
        ))}
      </div>
    </>)}

    {!projects.length&&!showForm&&(
      <div className="empty-state"><div className="e-lion">🦁</div>
        <p>Левів ще немає.<br/>Додай перший проект — і знайди свого лева.</p>
      </div>
    )}
    {projects.length>0&&!disp.length&&(
      <div className="empty-state"><div className="e-lion" style={{fontSize:'2.5rem'}}>🔍</div><p>Нічого не знайдено.</p></div>
    )}

    <div className="projects-grid">
      {disp.map(p=>(
        <ProjectCard key={p.id} project={p}
          onToggle={handleToggle}
          onDelete={setDeleteId}
          onArchive={handleArchive}
          onEdit={setEditProject}
          onProjDragStart={onProjDragStart}
          onProjDragOver={onProjDragOver}
          onProjDragEnd={onProjDragEnd}
          isDragging={dragProjIdRef.current===p.id}
          isDragOver={dragOverId===p.id&&dragProjIdRef.current!==p.id}
          onNewImage={handleNewImage}
          onPickImage={openPickMode}
          onPuzzlePlace={handlePuzzlePlace}
          customImage={p.imageId?bankImages.find(i=>i.id===p.imageId)?.data||null:null}
          allProjects={projects}
          togglProjData={togglData.projects?togglData.projects[p.id]||null:null}
        />
      ))}
    </div>

    {showToday&&<TodayModal projects={projects} onClose={()=>setShowToday(false)} onToggle={handleToggle}/>}
    {showToggl&&<TogglModal projects={projects} togglData={togglData} onClose={()=>setShowToggl(false)} onSynced={data=>{setTogglData(data);}}/>}
    {deleteId&&ptd&&<DeleteConfirm name={ptd.name} onConfirm={confirmDelete} onCancel={()=>setDeleteId(null)}/>}
    {editProject&&<EditOverlay project={editProject} onSave={handleSave} onCancel={()=>setEditProject(null)} allProjects={projects}/>}
    {showBank&&bankLoaded&&(
      <ImageBankModal
        bankImages={bankImages}
        onClose={()=>{setShowBank(false);setPickProjectId(null);}}
        onAddImage={handleAddBankImage}
        onDeleteImage={handleDeleteBankImage}
        pickMode={!!pickProjectId}
        currentImageId={pickProjectId?projects.find(p=>p.id===pickProjectId)?.imageId||null:null}
        onPick={handlePickImage}
      />
    )}
    {showArchive&&(
      <ArchiveModal
        archive={archive}
        projects={projects}
        bankImages={bankImages}
        onClose={()=>setShowArchive(false)}
        onRestore={handleRestore}
        onDeletePermanently={handleArchiveDelete}
        onExport={()=>exportBackup(projects,archive)}
        onImportFile={null}
      />
    )}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
